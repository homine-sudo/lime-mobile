<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="victoryあぐり">
<title>victoryあぐり</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='26' fill='%23fff'/%3E%3Crect x='45' y='57' width='6.5' height='14' rx='1.5' fill='%23A5CE6B'/%3E%3Crect x='54.5' y='50' width='6.5' height='21' rx='1.5' fill='%238FB73E'/%3E%3Crect x='64' y='42' width='6.5' height='29' rx='1.5' fill='%235E9E26'/%3E%3Cpath d='M18 40 L40 66 L80 22' fill='none' stroke='%232E7D46' stroke-width='11' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2A26; --sub:#7C786E; --line:#EDE6D6;
  --green:#2E7D46; --green-d:#1E5C32; --green-l:#E6F2E8;
  --mango:#F2A027; --mango-d:#B9700C; --mango-l:#FCEFD8;
  --sea:#2A7FB8; --sea-l:#E2F0F8;
  --red:#C8492F; --red-l:#FBE9E4;
  --shadow:0 2px 10px rgba(60,50,30,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  background:var(--bg);color:var(--ink);font-size:16px;line-height:1.6;
  padding-bottom:84px;-webkit-text-size-adjust:100%}
.wrap{max-width:520px;margin:0 auto;min-height:100vh;position:relative}

/* header */
.hdr{position:sticky;top:0;z-index:30;background:var(--green);color:#fff;
  padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.hdr .logo{font-size:22px;display:flex;align-items:center}
.hdr .logo svg{display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,.18))}
.hdr h1{font-size:19px;margin:0;font-weight:800;flex:1;letter-spacing:.02em}
.hdr .ver{font-size:11px;opacity:.8}
.pbar{position:sticky;top:54px;z-index:29;display:flex;align-items:center;justify-content:space-between;
  background:var(--green-l);color:var(--green-d);padding:7px 16px;font-size:13px;border-bottom:1px solid #D6E6CF;cursor:pointer}
.pbar b{font-weight:800}
.pbar .pbar-sw{font-weight:700;background:var(--card);border:1px solid #CFE0C6;border-radius:14px;padding:2px 11px;font-size:12px}
.hdr .gear{background:rgba(255,255,255,.18);border:none;color:#fff;width:38px;height:38px;
  border-radius:11px;font-size:19px;display:flex;align-items:center;justify-content:center}

/* screen */
.screen{padding:14px 14px 24px;display:none;animation:fade .18s ease}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.sec-t{font-size:13px;color:var(--sub);font-weight:700;margin:18px 4px 8px;letter-spacing:.05em}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:15px;box-shadow:var(--shadow);margin-bottom:12px}

/* weather card */
.wcard{background:linear-gradient(135deg,#3E97D1,#2A7FB8);color:#fff;border:none}
.wcard .top{display:flex;align-items:center;gap:12px}
.wcard .ic{font-size:40px;line-height:1}
.wcard .tmp{font-size:30px;font-weight:800}
.wcard .desc{font-size:14px;opacity:.95}
.wcard .row{display:flex;gap:8px;margin-top:10px;font-size:12px;opacity:.95;flex-wrap:wrap}
.wcard .pill{background:rgba(255,255,255,.2);padding:3px 9px;border-radius:20px}
.alert{background:var(--red);color:#fff;border-radius:14px;padding:11px 13px;margin-bottom:12px;
  display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;box-shadow:var(--shadow)}
.alert.warn{background:var(--mango)}

/* KPI */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:var(--shadow)}
.kpi .lbl{font-size:12px;color:var(--sub);font-weight:600}
.kpi .num{font-size:24px;font-weight:800;margin-top:2px}
.kpi .num.green{color:var(--green-d)} .kpi .num.mango{color:var(--mango-d)}
.kpi .sub{font-size:11px;color:var(--sub);margin-top:1px}

/* quick add */
.qrow{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:4px}
.qbtn{border:none;border-radius:16px;padding:15px 8px;font-size:15px;font-weight:700;
  color:#fff;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:var(--shadow)}
.qbtn .ic{font-size:25px}
.qbtn.ship{background:var(--mango)} .qbtn.work{background:var(--green)} .qbtn.cost{background:#8A6D3B}

/* feed */
.feed{display:flex;flex-direction:column;gap:8px}
.item{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;
  display:flex;align-items:center;gap:11px;box-shadow:var(--shadow)}
.item .dot{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0}
.item .dot.ship{background:var(--mango-l)} .item .dot.work{background:var(--green-l)}
.item .body{flex:1;min-width:0}
.item .ttl{font-size:15px;font-weight:700}
.item .meta{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .amt{font-size:15px;font-weight:800;color:var(--mango-d);white-space:nowrap}
.item .amt.unpaid{color:var(--red)}
.empty{text-align:center;color:var(--sub);font-size:14px;padding:30px 10px}

/* list head */
.lh{display:flex;align-items:center;justify-content:space-between;margin:4px 4px 10px}
.lh h2{font-size:19px;margin:0;font-weight:800}
.addbtn{background:var(--green);color:#fff;border:none;border-radius:12px;padding:9px 15px;
  font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow)}

/* chips */
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 10px;-ms-overflow-style:none;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:6px 13px;font-size:13px;font-weight:600;color:var(--sub)}
.chip.on{background:var(--green);color:#fff;border-color:var(--green)}

/* sales */
.bigamt{font-size:34px;font-weight:800;color:var(--green-d);text-align:center;margin:6px 0 2px}
.bigamt-sub{text-align:center;color:var(--sub);font-size:13px;margin-bottom:6px}
.brk{display:flex;align-items:center;gap:10px;padding:9px 2px;border-top:1px solid var(--line)}
.brk .nm{flex:1;font-size:14px;font-weight:600}
.brk .bar{height:8px;border-radius:5px;background:var(--green);flex:none}
.brk .vl{font-size:14px;font-weight:700;width:96px;text-align:right}
.monthnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.monthnav button{background:var(--card);border:1px solid var(--line);border-radius:11px;width:42px;height:42px;font-size:20px;font-weight:700;color:var(--ink)}
.monthnav .m{font-size:18px;font-weight:800}

/* bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--card);
  border-top:1px solid var(--line);display:flex;max-width:520px;margin:0 auto;
  padding-bottom:env(safe-area-inset-bottom,0)}
.nav button{flex:1;background:none;border:none;padding:9px 0 7px;display:flex;flex-direction:column;
  align-items:center;gap:2px;color:var(--sub);font-size:11px;font-weight:600}
.nav button .ic{font-size:23px}
.nav button.on{color:var(--green)}

/* FAB */
.fab{position:fixed;right:calc(50% - 248px);bottom:90px;z-index:39;width:60px;height:60px;border-radius:50%;
  background:var(--mango);color:#fff;border:none;font-size:32px;box-shadow:0 6px 18px rgba(242,160,39,.45);
  display:flex;align-items:center;justify-content:center}
@media(max-width:520px){.fab{right:18px}}

/* modal */
.ov{position:fixed;inset:0;z-index:50;background:rgba(40,35,25,.45);display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:520px;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;
  padding:8px 16px calc(20px + env(safe-area-inset-bottom,0));animation:up .25s ease}
@keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
.grab{width:42px;height:5px;border-radius:3px;background:#D9D2C4;margin:8px auto 6px}
.sheet h3{font-size:19px;margin:4px 2px 14px;font-weight:800}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;
  padding:12px 13px;font-size:16px;background:var(--card);color:var(--ink);font-family:inherit}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--green)}
.fld textarea{min-height:60px;resize:vertical}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg{display:flex;gap:7px;flex-wrap:wrap}
.seg button{flex:1;min-width:72px;border:1.5px solid var(--line);background:var(--card);border-radius:12px;
  padding:11px 6px;font-size:14px;font-weight:700;color:var(--sub)}
.seg button.on{background:var(--green-l);border-color:var(--green);color:var(--green-d)}
.save{width:100%;background:var(--green);color:#fff;border:none;border-radius:14px;padding:15px;
  font-size:17px;font-weight:800;margin-top:6px;box-shadow:var(--shadow)}
.del{width:100%;background:none;color:var(--red);border:none;padding:12px;font-size:15px;font-weight:700;margin-top:4px}
.amtprev{background:var(--mango-l);border-radius:12px;padding:11px 14px;text-align:center;margin-bottom:13px}
.amtprev .v{font-size:26px;font-weight:800;color:var(--mango-d)}
.amtprev .l{font-size:12px;color:var(--mango-d);font-weight:600}
.photo-prev{width:100%;border-radius:12px;margin-top:8px;display:none}
.ghost{background:var(--card);border:1.5px dashed var(--line);color:var(--sub);border-radius:12px;
  padding:13px;width:100%;font-size:15px;font-weight:600}

/* master rows */
.mrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:10px 12px;margin-bottom:8px}
.mrow .sw{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.mrow .nm{flex:1;font-weight:700;font-size:15px}
.mrow .ty{font-size:12px;color:var(--sub)}
.mrow .x{background:none;border:none;color:var(--red);font-size:18px;padding:2px 6px}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:60;
  background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-size:15px;font-weight:600;
  opacity:0;transition:opacity .2s;box-shadow:0 6px 20px rgba(0,0,0,.25);pointer-events:none}
.toast.on{opacity:1}
.note{font-size:12px;color:var(--sub);text-align:center;margin:14px 4px;line-height:1.7}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;margin-left:6px}
.tag.unpaid{background:var(--red-l);color:var(--red)}
.tag.paid{background:var(--green-l);color:var(--green-d)}

/* market */
.mkt-note{font-size:12px;color:#3a5a40;background:var(--green-l);border-radius:12px;padding:11px 13px;margin-bottom:12px;line-height:1.6}
.mkt-hint{font-size:12.5px;color:#1f4d70;background:var(--sea-l);border:1px solid #BFDDEF;border-radius:11px;padding:9px 12px;margin:-4px 0 13px;line-height:1.55}
.mkt-hint b{color:#0C447C}
.mkt-hint .hi{color:var(--green-d);font-weight:700} .mkt-hint .lo{color:var(--red);font-weight:700}
.mkt-note b{color:var(--green-d)}
.mrank{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.mrk{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid var(--line)}
.mrank .mrk:last-child{border-bottom:none}
.mrk.on{background:var(--green-l)}
.mrk .rkn{font-size:16px;font-weight:800;color:var(--green-d);width:18px;text-align:center;flex-shrink:0}
.mrk .em{font-size:21px;width:26px;text-align:center;flex-shrink:0}
.mrk .info{flex:1;min-width:0}
.mrk .nm{font-weight:700;font-size:15px}
.mtag{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;margin-left:5px;vertical-align:1px;white-space:nowrap}
.mtag.win{background:var(--green-l);color:var(--green-d)}
.mtag.vol{background:var(--sea-l);color:var(--sea)}
.mtag.niche{background:var(--mango-l);color:var(--mango-d)}
.mtag.mine{background:#FDEBD0;color:var(--mango-d);border:1px solid var(--mango)}
.mrk .sub{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrk .sc{font-size:18px;font-weight:800;color:var(--green-d);width:30px;text-align:right;flex-shrink:0}
.mcal{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-top:6px}
.mcal .mh{text-align:center;font-size:9px;color:var(--sub);font-weight:700}
.mcal .cell{border-radius:4px;text-align:center;padding:6px 0 5px;font-size:9.5px;font-weight:700;background:#ECE6D8;color:#B7AE99;line-height:1.15}
.mcal .cell small{font-size:7.5px;font-weight:600;opacity:.9;display:block}
.mlegend{display:flex;gap:11px;flex-wrap:wrap;font-size:11px;color:var(--sub);margin-top:10px;align-items:center}
.mlegend .sw{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:-2px;margin-right:3px}
.mkpi{display:flex;gap:8px;margin:13px 0 2px;flex-wrap:wrap}
.mkpi .k{flex:1;min-width:78px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:8px 10px}
.mkpi .k .l{font-size:10px;color:var(--sub);font-weight:600}
.mkpi .k .v{font-size:17px;font-weight:800;color:var(--green-d)}
.mseg{display:flex;gap:0;background:#EFEDE3;border-radius:10px;padding:3px;margin:0 0 10px}
.mseg button{flex:1;border:none;background:none;border-radius:8px;padding:7px 4px;font-size:12.5px;font-weight:700;color:var(--sub)}
.mseg button.on{background:var(--card);color:var(--green-d);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.mtop{display:flex;gap:0;background:#E8EFE6;border-radius:12px;padding:3px;margin:0 0 12px}
.mtop button{flex:1;border:none;background:none;border-radius:10px;padding:9px 4px;font-size:14px;font-weight:800;color:var(--sub)}
.mtop button.on{background:var(--green);color:#fff;box-shadow:var(--shadow)}
.wyr{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.wyr button{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:6px 10px;font-size:12px;font-weight:700;color:var(--sub)}
.wyr button.on{background:var(--red-l);border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <span class="logo"><svg viewBox="0 0 100 100" width="34" height="34" aria-label="victoryあぐり"><defs><linearGradient id="vg" x1="20" y1="66" x2="82" y2="20" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#1E5C32"/><stop offset="1" stop-color="#7CB342"/></linearGradient><marker id="vah" markerUnits="userSpaceOnUse" markerWidth="24" markerHeight="24" refX="7" refY="12" orient="auto"><path d="M2 2 L21 12 L2 22 L8 12 Z" fill="#7CB342"/></marker></defs><rect x="2" y="2" width="96" height="96" rx="26" fill="#fff"/><rect x="45" y="57" width="6.5" height="14" rx="1.5" fill="#A5CE6B"/><rect x="54.5" y="50" width="6.5" height="21" rx="1.5" fill="#8FB73E"/><rect x="64" y="42" width="6.5" height="29" rx="1.5" fill="#5E9E26"/><path d="M18 40 L40 66 L78 24" fill="none" stroke="url(#vg)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#vah)"/></svg></span>
    <h1>victory<span style="font-weight:700;opacity:.92">あぐり</span></h1>
    <span class="ver" id="ver"></span>
    <button class="gear" onclick="openSettings()">⚙️</button>
  </div>
  <div class="pbar" onclick="openProfiles()">
    <span>👤 <b id="who-name">農家</b> の畑</span>
    <span class="pbar-sw">切替 ▾</span>
  </div>

  <!-- HOME -->
  <div class="screen on" id="s-home"></div>
  <!-- SHIPMENTS -->
  <div class="screen" id="s-ship"></div>
  <!-- WORKLOG -->
  <div class="screen" id="s-work"></div>
  <!-- SALES -->
  <div class="screen" id="s-sales"></div>
  <!-- MARKET -->
  <div class="screen" id="s-market"></div>

  <button class="fab" id="fab" onclick="openShip()">＋</button>

  <div class="nav">
    <button class="on" data-s="home" onclick="go('home')"><span class="ic">🏠</span>ホーム</button>
    <button data-s="ship" onclick="go('ship')"><span class="ic">📦</span>出荷</button>
    <button data-s="work" onclick="go('work')"><span class="ic">🌱</span>日誌</button>
    <button data-s="sales" onclick="go('sales')"><span class="ic">💰</span>収支</button>
    <button data-s="market" onclick="go('market')"><span class="ic">📈</span>相場</button>
  </div>
</div>

<div class="ov" id="ov" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const APP_VERSION='2026-06-13j';
/* ===== 農家プロフィール（複数農家・データ分離）=====
   外部データ(相場/気温/旧暦=コード内)は全農家共通。
   各農家の入力データは victoryagri_data_<id> に分離保存され、互いに混ざらない。 */
const LS_PROFILES='victoryagri_profiles', LS_ACTIVE='victoryagri_active', LS_OLD='shimaagri_v1';
let activeId='';
function getProfiles(){try{return JSON.parse(localStorage.getItem(LS_PROFILES))||[]}catch(e){return[]}}
function setProfiles(p){try{localStorage.setItem(LS_PROFILES,JSON.stringify(p))}catch(e){}}
function dataKey(){return 'victoryagri_data_'+activeId}
function activeProfile(){return getProfiles().find(p=>p.id===activeId)||{name:'農家',region:'沖縄県'}}
function ensureProfile(){
  let ps=getProfiles();
  if(!ps.length){
    let old=null;try{old=localStorage.getItem(LS_OLD)}catch(e){}
    let name='農家1';if(old){try{name=(JSON.parse(old).meta||{}).farm||'農家1'}catch(e){}}
    const id='f'+Math.random().toString(36).slice(2,9);
    ps=[{id,name,region:'沖縄県',tel:'',crops:'',scale:'',memo:''}];
    setProfiles(ps);
    if(old){try{localStorage.setItem('victoryagri_data_'+id,old)}catch(e){}}
    activeId=id;try{localStorage.setItem(LS_ACTIVE,id)}catch(e){}
  }
  activeId=localStorage.getItem(LS_ACTIVE)||'';
  if(!activeId||!ps.some(p=>p.id===activeId)){activeId=ps[0].id;try{localStorage.setItem(LS_ACTIVE,activeId)}catch(e){}}
}
const UNITS=['kg','玉','袋','本','箱','ケース','束'];
const WORK_TYPES=[
  {k:'収穫',ic:'🧺'},{k:'防除',ic:'💧'},{k:'施肥',ic:'🌿'},
  {k:'定植',ic:'🌱'},{k:'除草',ic:'✂️'},{k:'その他',ic:'📝'}
];
const BUYER_TYPES=['直売所','飲食店','JA','個人','EC','市場'];
const EXPENSE_CATS=[
  {k:'肥料',ic:'🌿'},{k:'農薬',ic:'💧'},{k:'種苗',ic:'🌱'},{k:'資材',ic:'📦'},
  {k:'燃料',ic:'⛽'},{k:'人件費',ic:'👷'},{k:'出荷経費',ic:'🚚'},{k:'修繕',ic:'🔧'},{k:'その他',ic:'📝'}
];

const SOIL_TYPES=['国頭マージ（赤土）','ジャーガル（灰色）','島尻マージ（石灰岩土）','砂質土','黒ボク土','その他'];
const SEED={
  meta:{farm:'島あぐり',owner:'',loc:'沖縄県'},
  fields:[

let salesMonth=thisMonth();
function shiftMonth(d){const[y,m]=salesMonth.split('-').map(Number);const dt=new Date(y,m-1+d,1);salesMonth=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');renderSales()}
function renderSales(){
  const ms=shipOfMonth(salesMonth);
  const total=ms.reduce((a,s)=>a+s.amount,0);
  const paid=ms.filter(s=>s.paid).reduce((a,s)=>a+s.amount,0);
  const me=expOfMonth(salesMonth);
  const expTotal=me.reduce((a,e)=>a+e.amount,0);
  const profit=total-expTotal;
  const[y,m]=salesMonth.split('-');
  let h=`<div class="lh"><h2>収支</h2><div style="display:flex;gap:7px">
    <button class="addbtn" style="background:#8A6D3B" onclick="openExp()">＋ 費用</button>
    <button class="addbtn" style="background:var(--sea)" onclick="exportCSV()">⬇ CSV</button></div></div>`;
  h+=`<div class="monthnav"><button onclick="shiftMonth(-1)">‹</button>
      <div class="m">${+y}年 ${+m}月</div><button onclick="shiftMonth(1)">›</button></div>`;
  h+=`<div class="card"><div style="display:flex;text-align:center">
      <div style="flex:1"><div style="font-size:12px;color:var(--sub);font-weight:600">売上</div><div style="font-size:20px;font-weight:800;color:var(--green-d)">${yen(total)}</div></div>
      <div style="flex:1;border-left:1px solid var(--line)"><div style="font-size:12px;color:var(--sub);font-weight:600">費用</div><div style="font-size:20px;font-weight:800;color:#8A6D3B">${yen(expTotal)}</div></div>
      <div style="flex:1;border-left:1px solid var(--line)"><div style="font-size:12px;color:var(--sub);font-weight:600">利益</div><div style="font-size:20px;font-weight:800;color:${profit>=0?'var(--green-d)':'var(--red)'}">${yen(profit)}</div></div>
    </div>
    <div class="bigamt-sub" style="margin-top:8px;border-top:1px solid var(--line);padding-top:8px">出荷 ${ms.length}件 ・ 入金済 ${yen(paid)} ／ 未入金 ${yen(total-paid)}</div></div>`;

  // by crop
  const byCrop={};ms.forEach(s=>byCrop[s.cropId]=(byCrop[s.cropId]||0)+s.amount);
  const cr=Object.entries(byCrop).sort((a,b)=>b[1]-a[1]);
  const cmax=cr.length?cr[0][1]:1;
  h+=`<div class="sec-t">作物別</div><div class="card">`;
  if(!cr.length)h+=`<div class="empty">この月の売上はありません</div>`;
  cr.forEach(([cid,v])=>{const c=crop(cid);
    h+=`<div class="brk"><div class="nm">${esc(c.name)}</div>
      <div class="bar" style="width:${Math.max(8,v/cmax*120)}px;background:${c.color}"></div>
      <div class="vl">${yen(v)}</div></div>`;});
  h+=`</div>`;

  // by buyer
  const byBuyer={};ms.forEach(s=>byBuyer[s.buyerId]=(byBuyer[s.buyerId]||0)+s.amount);
  const br=Object.entries(byBuyer).sort((a,b)=>b[1]-a[1]);
  const bmax=br.length?br[0][1]:1;
  h+=`<div class="sec-t">出荷先別</div><div class="card">`;
  if(!br.length)h+=`<div class="empty">—</div>`;
  br.forEach(([bid,v])=>{const b=buyer(bid);
    h+=`<div class="brk"><div class="nm">${esc(b.name)} <span style="color:var(--sub);font-size:12px">${esc(b.type)}</span></div>
      <div class="bar" style="width:${Math.max(8,v/bmax*120)}px;background:var(--sea)"></div>
      <div class="vl">${yen(v)}</div></div>`;});
  h+=`</div>`;

  // expense breakdown
  const byCat={};me.forEach(e=>byCat[e.cat]=(byCat[e.cat]||0)+e.amount);
  const er=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const emax=er.length?er[0][1]:1;
  h+=`<div class="sec-t">費用の内訳</div><div class="card">`;
  if(!er.length)h+=`<div class="empty">この月の費用はありません</div>`;
  er.forEach(([k,v])=>{
    h+=`<div class="brk"><div class="nm">${esc(k)}</div>
      <div class="bar" style="width:${Math.max(8,v/emax*120)}px;background:#8A6D3B"></div>
      <div class="vl">${yen(v)}</div></div>`;});
  h+=`</div>`;

  // expense list
  const el=[...me].sort((a,b)=>b.date<a.date?-1:1);
  if(el.length){
    h+=`<div class="sec-t">費用の記録（${+m}月 ${el.length}件）</div><div class="feed">`;
    el.forEach(e=>{const ec=EXPENSE_CATS.find(t=>t.k===e.cat)||{ic:'💴'};
      h+=`<div class="item" onclick="editExp('${e.id}')">
        <div class="dot" style="background:#EFE6D3">${ec.ic}</div>
        <div class="body"><div class="ttl">${esc(e.cat)}</div>
        <div class="meta">${fmtDate(e.date)}${e.vendor?'・'+esc(e.vendor):''}${e.note?'・'+esc(e.note):''}</div></div>
        <div class="amt" style="color:#8A6D3B">−${yen(e.amount)}</div></div>`;});
    h+=`</div>`;
  }

  // unpaid
  const up=DATA.shipments.filter(s=>!s.paid).sort((a,b)=>a.date<b.date?-1:1);
  h+=`<div class="sec-t">未入金 ${up.length}件（全期間）</div><div class="feed">`;
  if(!up.length)h+=`<div class="empty">未入金はありません ✅</div>`;
  up.forEach(r=>{const c=crop(r.cropId),b=buyer(r.buyerId);
    h+=`<div class="item" onclick="editShip('${r.id}')">
      <div class="dot ship" style="background:var(--red-l)">💴</div>
      <div class="body"><div class="ttl">${esc(b.name)}</div>
      <div class="meta">${fmtDate(r.date)}・${esc(c.name)} ${r.qty}${esc(r.unit)}</div></div>
      <div class="amt unpaid">${yen(r.amount)}</div></div>`;});
  h+=`</div><div class="note">CSVは確定申告・freee取込用。Phase2で会計ソフト連携も可能</div>`;
  document.getElementById('s-sales').innerHTML=h;
}

/* ===== 二十四節気・旧暦（天文計算・参考精度／出典: Meeus簡略式） ===== */
const RAD=Math.PI/180;
const SEKKI=['春分','清明','穀雨','立夏','小満','芒種','夏至','小暑','大暑','立秋','処暑','白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至','小寒','大寒','立春','雨水','啓蟄'];
function _jd(y,m,d){if(m<=2){y--;m+=12}const A=Math.floor(y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5}
function _slong(jd){const T=(jd-2451545)/36525;const L0=280.46646+36000.76983*T+0.0003032*T*T;const M=357.52911+35999.05029*T-0.0001537*T*T;const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(M*RAD)+(0.019993-0.000101*T)*Math.sin(2*M*RAD)+0.000289*Math.sin(3*M*RAD);return((L0+C-0.00569)%360+360)%360}
function _newMoon(k){const T=k/1236.85;let jd=2451550.09766+29.530588861*k+0.00015437*T*T-1.5e-7*T*T*T;const M=(2.5534+29.1053567*k)*RAD,Mp=(201.5643+385.81693528*k+0.0107582*T*T)*RAD,F=(160.7108+390.67050284*k-0.0016118*T*T)*RAD,E=1-0.002516*T;jd+=-0.4072*Math.sin(Mp)+0.17241*E*Math.sin(M)+0.01608*Math.sin(2*Mp)+0.01039*Math.sin(2*F)+0.00739*E*Math.sin(Mp-M)-0.00514*E*Math.sin(Mp+M)+0.00208*E*E*Math.sin(2*M)-0.00111*Math.sin(Mp-2*F)-0.00057*Math.sin(Mp+2*F);return jd}
const _dayNo=j=>Math.floor(j+0.5+9/24); // JST日付番号
function _termAfter(afterJD,targetLon){let jd=afterJD;for(let i=0;i<60;i++){const diff=((targetLon-_slong(jd)+540)%360)-180;if(Math.abs(diff)<1e-4)break;jd+=diff*0.9856}return jd}
// 旧正月2026-02-17 を 旧1月1日 とする（当年基準・参考）
const _KANCHOR=Math.round((_jd(2026,2,17)-2451550.09766)/29.530588861);
function kyureki(y,m,d){
  const jd=_jd(y,m,d),tno=_dayNo(jd);
  let k=Math.round((jd-2451550.09766)/29.530588861);
  while(_dayNo(_newMoon(k+1))<=tno)k++;
  while(_dayNo(_newMoon(k))>tno)k--;
  const day=tno-_dayNo(_newMoon(k))+1;
  const mon=(((k-_KANCHOR)%12)+12)%12+1;
  return {m:mon,d:day};
}
function sekkiNow(y,m,d){
  const jd=_jd(y,m,d),l=_slong(jd),n=Math.floor(l/15);
  const cur=SEKKI[n], nextLon=((n+1)*15)%360;
  const nj=_termAfter(jd+1,nextLon), nd=new Date((nj-2440587.5)*86400000+9*3600000);
  return {cur, next:SEKKI[(n+1)%24], nextMD:(nd.getUTCMonth()+1)+'/'+nd.getUTCDate()};
}

/* 株価チャート風：価格の折れ線＋下に出来高バー（SVG） */
function buildPriceChart(it){
  const W=360,padL=8,padR=12,topP=16,priceB=148,volT=170,volB=210;
  const xs=i=>padL+i*((W-padL-padR)/11);
  const pv=it.price.filter(x=>x!=null);
  if(!pv.length)return '<div class="empty">価格データなし</div>';
  const pmin=Math.min(...pv),pmax=Math.max(...pv),yspan=(pmax-pmin)||1;
  const yFor=p=>priceB-(p-pmin)/yspan*(priceB-topP);
  // グリッド＋¥目盛
  let grid='';
  const gridVals=(pmax===pmin)?[pmax]:[pmin,(pmin+pmax)/2,pmax];
  gridVals.forEach(val=>{const y=yFor(val);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#E8E1D3" stroke-width="1"/>`;
    grid+=`<text x="${W-padR+1}" y="${(y+3).toFixed(1)}" text-anchor="start" font-size="8" fill="#A89F8C">¥${Math.round(val)}</text>`;});
  // 折れ線＋エリア（欠測月で区切る）
  let paths='',seg=[];
  const flush=()=>{
    if(seg.length>1){
      const d='M'+seg.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('L');
      paths+=`<path d="${d}L${seg[seg.length-1].x.toFixed(1)},${priceB}L${seg[0].x.toFixed(1)},${priceB}Z" fill="url(#pgrad)"/>`;
      paths+=`<path d="${d}" fill="none" stroke="#2E7D46" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
    seg.forEach(p=>paths+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.3" fill="#2E7D46"/>`);
    seg=[];
  };
  it.price.forEach((p,i)=>{if(p==null)flush();else seg.push({x:xs(i),y:yFor(p)})});
  flush();
  // 高値（赤）・安値（青）マーカー
  const hiI=it.price.indexOf(pmax),loI=it.price.indexOf(pmin);let marks='';
  if(hiI>=0){const x=xs(hiI),y=yFor(pmax);
    marks+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="#C8492F"/>`;
    marks+=`<text x="${Math.min(Math.max(x,18),W-26).toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#C8492F">¥${pmax}</text>`;}
  if(loI>=0&&loI!==hiI){const x=xs(loI),y=yFor(pmin);
    marks+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.6" fill="#2A7FB8"/>`;
    marks+=`<text x="${Math.min(Math.max(x,18),W-26).toFixed(1)}" y="${(y+13).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2A7FB8">¥${pmin}</text>`;}
  // 出来高バー
  const vmax=Math.max(...it.vol.map(v=>v||0))||1;let vol='';
  it.price.forEach((p,i)=>{const v=it.vol[i];if(v==null)return;
    const bh=Math.max(2,(v/vmax)*(volB-volT)),x=xs(i);
    vol+=`<rect x="${(x-7).toFixed(1)}" y="${(volB-bh).toFixed(1)}" width="14" height="${bh.toFixed(1)}" rx="2" fill="#9CC76B"/>`;});
  let ax='';for(let i=0;i<12;i++)ax+=`<text x="${xs(i).toFixed(1)}" y="${(volB+13).toFixed(1)}" text-anchor="middle" font-size="8.5" fill="#A89F8C">${i+1}</text>`;
  return `<svg viewBox="0 0 ${W} 228" width="100%" style="display:block">
    <defs><linearGradient id="pgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E7D46" stop-opacity="0.26"/><stop offset="1" stop-color="#2E7D46" stop-opacity="0.02"/></linearGradient></defs>
    ${grid}${paths}${marks}
    <text x="${padL}" y="${(volT-3).toFixed(1)}" font-size="8" fill="#A89F8C">出荷量（t）</text>${vol}${ax}</svg>`;
}

/* 株価チャート風：過去10年の年平均単価（折れ線・SVG） */
function buildYearChart(annual){
  const W=360,padL=8,padR=14,topP=16,base=150;
  const n=annual.length, xs=i=>padL+i*((W-padL-padR)/(n-1));
  const vmin=Math.min(...annual),vmax=Math.max(...annual),span=(vmax-vmin)||1;
  const yFor=v=>base-(v-vmin)/span*(base-topP);
  let grid='';
  [vmin,(vmin+vmax)/2,vmax].forEach(v=>{const y=yFor(v);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#E8E1D3"/>`;
    grid+=`<text x="${W-padR+1}" y="${(y+3).toFixed(1)}" font-size="8" fill="#A89F8C">¥${Math.round(v)}</text>`});
  const pts=annual.map((v,i)=>({x:xs(i),y:yFor(v),v}));
  const d='M'+pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('L');
  let g=`<path d="${d}L${pts[n-1].x.toFixed(1)},${base}L${pts[0].x.toFixed(1)},${base}Z" fill="url(#pgrad)"/>`;
  g+=`<path d="${d}" fill="none" stroke="#2E7D46" stroke-width="2.4" stroke-linejoin="round"/>`;
  pts.forEach(p=>g+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.3" fill="#2E7D46"/>`);
  const hiI=annual.indexOf(vmax),loI=annual.indexOf(vmin);
  g+=`<circle cx="${pts[hiI].x.toFixed(1)}" cy="${pts[hiI].y.toFixed(1)}" r="4" fill="#C8492F"/><text x="${Math.min(Math.max(pts[hiI].x,18),W-24).toFixed(1)}" y="${(pts[hiI].y-7).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#C8492F">¥${vmax}</text>`;
  g+=`<circle cx="${pts[loI].x.toFixed(1)}" cy="${pts[loI].y.toFixed(1)}" r="3.5" fill="#2A7FB8"/><text x="${Math.min(Math.max(pts[loI].x,18),W-24).toFixed(1)}" y="${(pts[loI].y+13).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2A7FB8">¥${vmin}</text>`;
  let ax='';annual.forEach((v,i)=>{if(i%2===0||i===n-1)ax+=`<text x="${xs(i).toFixed(1)}" y="172" text-anchor="middle" font-size="8" fill="#A89F8C">${ANNUAL_Y0+i}</text>`});
  return `<svg viewBox="0 0 ${W} 180" width="100%" style="display:block">
    <defs><linearGradient id="pgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2E7D46" stop-opacity="0.26"/><stop offset="1" stop-color="#2E7D46" stop-opacity="0.02"/></linearGradient></defs>${grid}${g}${ax}</svg>`;
}

/* 株価チャート風：過去10年の月平均気温（120ヶ月の連続折れ線・SVG） */
function buildLongTempChart(wx,yearsArg){
  const years=(yearsArg||Object.keys(wx).map(Number)).sort();
  const series=[];years.forEach(y=>wx[y].forEach((t,mi)=>series.push({y,mi,t})));
  const W=360,padL=8,padR=20,topP=12,base=150;
  const n=series.length, xs=i=>padL+i*((W-padL-padR)/(n-1));
  const tmin=Math.floor(Math.min(...series.map(s=>s.t))),tmax=Math.ceil(Math.max(...series.map(s=>s.t))),span=(tmax-tmin)||1;
  const yFor=t=>base-(t-tmin)/span*(base-topP);
  let grid='';
  [tmin,(tmin+tmax)/2,tmax].forEach(t=>{const y=yFor(t);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#E8E1D3"/>`;
    grid+=`<text x="${W-padR+1}" y="${(y+3).toFixed(1)}" font-size="8" fill="#A89F8C">${Math.round(t)}℃</text>`});
  const d='M'+series.map((s,i)=>`${xs(i).toFixed(1)},${yFor(s.t).toFixed(1)}`).join('L');
  let g=`<path d="${d}L${xs(n-1).toFixed(1)},${base}L${padL},${base}Z" fill="url(#tgrad)"/>`;
  g+=`<path d="${d}" fill="none" stroke="#C0492F" stroke-width="1.5" stroke-linejoin="round"/>`;
  // 年ラベル＋年区切り
  let ax='';years.forEach((y,yi)=>{const i=yi*12+6;if(yi%2===0||yi===years.length-1)ax+=`<text x="${xs(i).toFixed(1)}" y="172" text-anchor="middle" font-size="8" fill="#A89F8C">${y}</text>`;
    if(yi>0)g+=`<line x1="${xs(yi*12).toFixed(1)}" y1="${topP}" x2="${xs(yi*12).toFixed(1)}" y2="${base}" stroke="#F0EADC"/>`});
  return `<svg viewBox="0 0 ${W} 180" width="100%" style="display:block">
    <defs><linearGradient id="tgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C0492F" stop-opacity="0.20"/><stop offset="1" stop-color="#C0492F" stop-opacity="0.02"/></linearGradient></defs>${grid}${g}${ax}</svg>`;
}

/* ===== 気象ビュー ===== */
function buildTempYearChart(vals,years){
  const W=360,padL=8,padR=20,topP=14,base=140;const n=vals.length,xs=i=>padL+i*((W-padL-padR)/(n-1));
  const lo=Math.floor(Math.min(...vals)*10)/10-0.2,hi=Math.ceil(Math.max(...vals)*10)/10+0.2,span=(hi-lo)||1;
  const yF=v=>base-(v-lo)/span*(base-topP);
  let g='';[lo,(lo+hi)/2,hi].forEach(v=>{const y=yF(v);g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#E8E1D3"/><text x="${W-padR+1}" y="${(y+3).toFixed(1)}" font-size="8" fill="#A89F8C">${v.toFixed(1)}℃</text>`});
  const d='M'+vals.map((v,i)=>`${xs(i).toFixed(1)},${yF(v).toFixed(1)}`).join('L');
  g+=`<path d="${d}" fill="none" stroke="#C0492F" stroke-width="2.2"/>`;
  vals.forEach((v,i)=>g+=`<circle cx="${xs(i).toFixed(1)}" cy="${yF(v).toFixed(1)}" r="2.3" fill="#C0492F"/>`);
  let ax='';years.forEach((y,i)=>{if(i%2===0||i===n-1)ax+=`<text x="${xs(i).toFixed(1)}" y="162" text-anchor="middle" font-size="8" fill="#A89F8C">${y}</text>`});
  return `<svg viewBox="0 0 ${W} 170" width="100%" style="display:block">${g}${ax}</svg>`;
}
function buildMonthTempChart(yr,avg){
  const W=360,padL=8,padR=20,topP=12,base=140;const xs=i=>padL+i*((W-padL-padR)/11);
  const all=yr.concat(avg),lo=Math.floor(Math.min(...all))-1,hi=Math.ceil(Math.max(...all))+1,span=(hi-lo)||1;
  const yF=v=>base-(v-lo)/span*(base-topP);
  let g='';[lo,(lo+hi)/2,hi].forEach(v=>{const y=yF(v);g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#E8E1D3"/><text x="${W-padR+1}" y="${(y+3).toFixed(1)}" font-size="8" fill="#A89F8C">${Math.round(v)}℃</text>`});
  const dA='M'+avg.map((v,i)=>`${xs(i).toFixed(1)},${yF(v).toFixed(1)}`).join('L');
  g+=`<path d="${dA}" fill="none" stroke="#B3AC9B" stroke-width="1.5" stroke-dasharray="4 3"/>`;
  const dY='M'+yr.map((v,i)=>`${xs(i).toFixed(1)},${yF(v).toFixed(1)}`).join('L');
  g+=`<path d="${dY}" fill="none" stroke="#C0492F" stroke-width="2.2"/>`;
  yr.forEach((v,i)=>g+=`<circle cx="${xs(i).toFixed(1)}" cy="${yF(v).toFixed(1)}" r="2.2" fill="#C0492F"/>`);
  let ax='';for(let i=0;i<12;i++)ax+=`<text x="${xs(i).toFixed(1)}" y="158" text-anchor="middle" font-size="8" fill="#A89F8C">${i+1}</text>`;
  return `<svg viewBox="0 0 ${W} 166" width="100%" style="display:block">${g}${ax}</svg>`;
}
function tempAdvice(mi,anom){
  const hot=anom>=0.8,cold=anom<=-0.8;
  let s;
  if(hot)s='平年より高め。生育は早まるが、ハウスの換気・かん水と病害虫（アザミウマ・うどんこ）に注意。出荷の前倒しを想定。';
  else if(cold)s='平年より低め。生育の遅れ・着果不良に注意。保温・遅霜対策と収穫見込みの後ろ倒しを。';
  else s='ほぼ平年並み。例年どおりの管理でOK。';
  return s;
}
function renderWeather(h){
  const years=Object.keys(WX_TEMP).map(Number).sort();
  const annualMeanOf=y=>WX_TEMP[y].reduce((a,b)=>a+b,0)/12;
  const normal=years.reduce((a,y)=>a+annualMeanOf(y),0)/years.length;
  const monAvg=[...Array(12)].map((_,mi)=>years.reduce((a,y)=>a+WX_TEMP[y][mi],0)/years.length);
  if(!WX_TEMP[wxYear])wxYear=years[years.length-1];
  // 期間フィルタ
  h+=`<div class="mseg">
    <button class="${wxRange==='1'?'on':''}" onclick="wxRange='1';renderMarket()">${wxYear}年 詳しく</button>
    <button class="${wxRange==='3'?'on':''}" onclick="wxRange='3';renderMarket()">直近3年</button>
    <button class="${wxRange==='10'?'on':''}" onclick="wxRange='10';renderMarket()">10年</button></div>`;

  if(wxRange==='1'){
    const sel=WX_TEMP[wxYear],ym=annualMeanOf(wxYear),anom=ym-normal;
    const mi=new Date().getMonth();
    const monAnom=sel[mi]-monAvg[mi];
    const verdict=anom>=0.4?'高温ぎみの年':anom<=-0.4?'低温ぎみの年':'ほぼ平年並み';
    const vcol=anom>=0.4?'var(--red)':anom<=-0.4?'var(--sea)':'var(--green-d)';
    // 平年比の判定カード（意味）
    h+=`<div class="card" style="border-color:#E6DEC8">
      <div style="font-size:12px;color:var(--sub);font-weight:700">那覇・${wxYear}年の気候</div>
      <div style="font-size:21px;font-weight:800;color:${vcol};margin:1px 0 2px">${verdict}</div>
      <div style="font-size:12.5px;color:var(--sub)">年平均 <b style="color:${vcol}">${ym.toFixed(1)}℃</b> ・ 過去10年平均 ${normal.toFixed(1)}℃（<b style="color:${vcol}">${anom>=0?'+':''}${anom.toFixed(1)}℃</b>）</div>
      <div class="mkt-note" style="margin-top:10px"><b>${mi+1}月の目安：</b>${wxYear}年${mi+1}月は平年比 <b style="color:${monAnom>=0?'var(--red)':'var(--sea)'}">${monAnom>=0?'+':''}${monAnom.toFixed(1)}℃</b>。${tempAdvice(mi,monAnom)}</div>
    </div>`;
    h+=`<div style="font-size:12.5px;font-weight:700;margin:14px 2px 4px">📅 ${wxYear}年 月別気温（— 実線）と 平年＝過去10年平均（- - 破線）</div>`;
    h+=buildMonthTempChart(sel,monAvg);
    h+=`<div class="mlegend"><span><span class="sw" style="background:#C0492F"></span>${wxYear}年</span><span><span class="sw" style="background:#B3AC9B"></span>平年(10年平均)</span><span>上に外れた月＝高温</span></div>`;
    h+=`<div style="font-size:11.5px;color:var(--sub);margin:10px 2px 2px">▼ 年を選ぶ</div>`;
    h+=`<div class="wyr">`+years.map(y=>`<button class="${y===wxYear?'on':''}" onclick="wxYear=${y};renderMarket()">${y}</button>`).join('')+`</div>`;
  } else {
    const n=wxRange==='3'?3:10;const ys=years.slice(-n);
    h+=`<div style="font-size:12.5px;font-weight:700;margin:2px 2px 4px">🌡️ 那覇 月平均気温・直近${n}年（気象庁 実測）</div>`;
    h+=buildLongTempChart(WX_TEMP,ys);
    h+=`<div class="mlegend"><span><span class="sw" style="background:#C0492F"></span>月平均気温</span><span>縦線＝年の区切り</span></div>`;
    h+=`<div style="font-size:12.5px;font-weight:700;margin:16px 2px 4px">📈 年平均気温の推移（直近${n}年）</div>`;
    h+=buildTempYearChart(ys.map(annualMeanOf),ys);
    const warm=annualMeanOf(ys[ys.length-1])-annualMeanOf(ys[0]);
    h+=`<div class="mkt-note" style="margin-top:10px">${warm>=0.3?`<b style="color:var(--red)">この${n}年で年平均 +${warm.toFixed(1)}℃。</b>暖冬は冬野菜（さやいんげん等）の出荷前進、猛暑年は着果・品質低下に注意。`:`年平均は ${annualMeanOf(ys[ys.length-1]).toFixed(1)}℃ 前後で推移。大きな偏りは小さい。`}</div>`;
  }
  h+=`<div class="note">出典：気象庁 那覇。<b>当年のリアルタイム気象・台風・降水量、価格×気温の「当たり年」判定は Phase2</b> で追加予定（ここが本命）。</div>`;
  document.getElementById('s-market').innerHTML=h;
}

function saveShip(){

function delShip(){if(!confirm('この出荷記録を削除しますか？'))return;DATA.shipments=DATA.shipments.filter(s=>s.id!==editId);save();closeSheet();render();toast('削除しました')}

/* ============ worklog modal ============ */
function openWork(){editId=null;workForm({date:todayStr(),type:'収穫',cropId:DATA.crops[0]?.id,field:'',material:'',dose:'',note:'',photo:'',weather:'晴れ'})}
function editWork(id){editId=id;workForm(DATA.worklogs.find(w=>w.id===id))}
let _wtype='収穫',_photo='';
function workForm(w){
  _wtype=w.type;_photo=w.photo||'';
  let cops=DATA.crops.map(c=>`<option value="${c.id}" ${c.id===w.cropId?'selected':''}>${esc(c.name)}</option>`).join('');

  <h3>🌱 ${editId?'作業を編集':'作業を記録'}</h3>
  <div class="fld"><label>作業の種類</label><div class="seg" style="flex-wrap:wrap">${segs}</div></div>
  <div class="fld"><label>作物</label><select id="f-crop">${cops}</select></div>

  <div id="chem-box" style="display:${w.type==='防除'||w.type==='施肥'?'block':'none'}">
    <div class="two">
      <div class="fld"><label>${w.type==='施肥'?'肥料名':'農薬名'}</label><input id="f-material" value="${esc(w.material)}" placeholder="例：アファーム乳剤"></div>
      <div class="fld"><label>希釈・量</label><input id="f-dose" value="${esc(w.dose)}" placeholder="2000倍 など"></div>
    </div>
  </div>

    <div class="fld"><label>日付</label><input id="f-date" type="date" value="${w.date}"></div>
    <div class="fld"><label>天気</label><select id="f-weather">
      ${['晴れ','曇り','雨','台風','強風'].map(x=>`<option ${x===w.weather?'selected':''}>${x}</option>`).join('')}</select></div>
  </div>
  <div class="fld"><label>メモ（任意）</label><textarea id="f-note" placeholder="気づいたこと・状態など">${esc(w.note)}</textarea></div>
  <div class="fld"><label>写真（任意）</label>
    <button type="button" class="ghost" onclick="document.getElementById('f-photo').click()">📷 写真を撮る／選ぶ</button>
    <input id="f-photo" type="file" accept="image/*" style="display:none" onchange="onPhoto(this)">

  ${editId?'<button class="del" onclick="delWork()">この記録を削除</button>':''}`);

function setWType(k){_wtype=k;document.querySelectorAll('#chem-box').forEach(e=>e.style.display=(k==='防除'||k==='施肥')?'block':'none');
  document.querySelectorAll('.sheet .seg button').forEach(b=>b.classList.toggle('on',b.textContent.includes(k)));
  const lbl=document.querySelector('#chem-box label');if(lbl)lbl.textContent=(k==='施肥'?'肥料名':'農薬名')}
function onPhoto(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{_photo=e.target.result;const p=document.getElementById('photoPrev');p.src=_photo;p.style.display='block'};r.readAsDataURL(f)}
function saveWork(){
  const o={id:editId||uid(),date:document.getElementById('f-date').value,type:_wtype,cropId:document.getElementById('f-crop').value,

    material:(document.getElementById('f-material')?.value||'').trim(),dose:(document.getElementById('f-dose')?.value||'').trim(),
    note:document.getElementById('f-note').value.trim(),photo:_photo,weather:document.getElementById('f-weather').value};
  if(editId){const i=DATA.worklogs.findIndex(w=>w.id===editId);DATA.worklogs[i]=o}
  else DATA.worklogs.unshift(o);

function delWork(){if(!confirm('この作業記録を削除しますか？'))return;DATA.worklogs=DATA.worklogs.filter(w=>w.id!==editId);save();closeSheet();render();toast('削除しました')}

/* ============ expense modal ============ */
let _ecat='肥料';
function openExp(){editId=null;expForm({date:todayStr(),cat:'肥料',amount:'',vendor:'',note:''})}
function editExp(id){editId=id;expForm(DATA.expenses.find(e=>e.id===id))}

function delExp(){if(!confirm('この費用記録を削除しますか？'))return;DATA.expenses=DATA.expenses.filter(e=>e.id!==editId);save();closeSheet();render();toast('削除しました')}

/* ============ settings ============ */
function openSettings(){
  let ch=DATA.crops.map(c=>`<div class="mrow"><span class="sw" style="background:${c.color}"></span>
    <span class="nm">${esc(c.name)}</span><span class="ty">${esc(c.kind)}・${esc(c.unit)}</span>
    <button class="x" onclick="delCrop('${c.id}')">✕</button></div>`).join('');
  let bh=DATA.buyers.map(b=>`<div class="mrow"><span class="nm">${esc(b.name)}</span><span class="ty">${esc(b.type)}</span>
    <button class="x" onclick="delBuyer('${b.id}')">✕</button></div>`).join('');
  let fh=DATA.fields.map(f=>`<div class="mrow" onclick="openFieldForm('${f.id}')" style="cursor:pointer">
    <span class="sw" style="background:#B98A4B"></span><span class="nm">${esc(f.name)}</span>
    <span class="ty">${esc(f.soil||'')}${f.ph?' ・ pH'+f.ph:''}${f.area?' ・ '+esc(f.area):''}</span><span style="color:var(--sub)">›</span></div>`).join('');
  const ap=activeProfile();
  openSheet(`
  <h3>⚙️ 設定</h3>
  <div class="sec-t">現在の農家</div>
  <div class="card" style="margin-bottom:10px">
    <div style="font-weight:800;font-size:16px">👤 ${esc(ap.name)}</div>
    <div style="font-size:12.5px;color:var(--sub);margin-top:2px">${esc(ap.region||'沖縄県')}${ap.crops?' ・ '+esc(ap.crops):''}${ap.scale?' ・ '+esc(ap.scale):''}</div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:18px">
    <button class="ghost" style="flex:1" onclick="openProfileEdit('${activeId}')">✏️ 農家情報を編集</button>
    <button class="ghost" style="flex:1" onclick="openProfiles()">🔄 農家を切替・追加</button>
  </div>

  <div class="sec-t">作物マスタ</div>${ch}
  <button class="ghost" style="margin-bottom:18px" onclick="addCrop()">＋ 作物を追加</button>

  <div class="sec-t">圃場マスタ（土の種類・pH）</div>${fh||'<div class="note" style="text-align:left;margin:0 0 8px">圃場を登録すると、作業日誌で圃場ごとに記録でき、土質・pHを参照できます。</div>'}
  <button class="ghost" style="margin-bottom:18px" onclick="openFieldForm()">＋ 圃場を追加</button>

  <div class="sec-t">出荷先マスタ</div>${bh}
  <button class="ghost" onclick="addBuyer()">＋ 出荷先を追加</button>

  <div class="note">この農家のデータはこの端末に保存（外部データ＝相場・気温は全農家共通）。Phase2でDropbox同期・LINE通知に対応予定。</div>
  <button class="del" onclick="if(confirm('「${esc(ap.name)}」のデータを消して初期化しますか？（他の農家は影響なし）')){localStorage.removeItem(dataKey());DATA=load();render();closeSheet();toast('初期化しました')}">この農家のデータを初期化</button>`);
}
function saveSettings(){DATA.meta.farm=document.getElementById('set-farm').value.trim()||'農家';DATA.meta.loc=document.getElementById('set-loc').value.trim();save();render();toast('保存しました');closeSheet()}
/* ===== 農家プロフィール ===== */
function openProfiles(){
  const ps=getProfiles();
  const rows=ps.map(p=>`<div class="mrow" style="cursor:pointer ${p.id===activeId?';background:var(--green-l);border-color:var(--green)':''}" onclick="switchProfile('${p.id}')">
    <span style="font-size:20px">${p.id===activeId?'✅':'👤'}</span>
    <span class="nm">${esc(p.name)}</span>
    <span class="ty">${esc(p.region||'')}</span>
    <button class="x" style="color:var(--sub)" onclick="event.stopPropagation();openProfileEdit('${p.id}')">✏️</button></div>`).join('');
  openSheet(`<h3>👥 農家を切替</h3>
    <div class="note" style="text-align:left;margin:0 0 10px">農家ごとにデータは完全に分かれています。<b>相場・気温などの外部データは全員共通</b>です。</div>
    ${rows}
    <button class="ghost" style="margin-top:8px" onclick="addProfile()">＋ 農家を追加</button>`);
}
function switchProfile(id){
  if(id===activeId){closeSheet();return}
  activeId=id;try{localStorage.setItem(LS_ACTIVE,id)}catch(e){}
  DATA=load();DATA.meta.farm=activeProfile().name;DATA.meta.loc=activeProfile().region||DATA.meta.loc;save();
  closeSheet();go('home');toast('切替：'+activeProfile().name);
}
function addProfile(){
  const ps=getProfiles();
  const id='f'+Math.random().toString(36).slice(2,9);
  ps.push({id,name:'農家'+(ps.length+1),region:'沖縄県',tel:'',crops:'',scale:'',memo:''});
  setProfiles(ps);
  const fresh=JSON.parse(JSON.stringify(SEED));fresh.meta.farm='農家'+ps.length;
  try{localStorage.setItem('victoryagri_data_'+id,JSON.stringify(fresh))}catch(e){}
  activeId=id;try{localStorage.setItem(LS_ACTIVE,id)}catch(e){}
  DATA=load();go('home');openProfileEdit(id);
}
let _editProfileId=null;
function openProfileEdit(id){
  _editProfileId=id;const p=getProfiles().find(x=>x.id===id)||{name:'',region:'沖縄県',tel:'',crops:'',scale:'',memo:''};
  const multi=getProfiles().length>1;
  openSheet(`<h3>👤 農家情報</h3>
    <div class="fld"><label>農家名・農場名</label><input id="pf-name" value="${esc(p.name)}" placeholder="○○ファーム・氏名 など"></div>
    <div class="fld"><label>地域</label><input id="pf-region" value="${esc(p.region||'')}" placeholder="沖縄県八重瀬町 など"></div>
    <div class="two">
      <div class="fld"><label>連絡先（任意）</label><input id="pf-tel" value="${esc(p.tel||'')}" placeholder="090-..."></div>
      <div class="fld"><label>経営規模（任意）</label><input id="pf-scale" value="${esc(p.scale||'')}" placeholder="50a・ハウス3棟 など"></div>
    </div>
    <div class="fld"><label>主な作物（任意）</label><input id="pf-crops" value="${esc(p.crops||'')}" placeholder="ゴーヤー・マンゴー など"></div>
    <div class="fld"><label>メモ（任意）</label><input id="pf-memo" value="${esc(p.memo||'')}" placeholder="出荷先・栽培方針 など"></div>
    <button class="save" onclick="saveProfile()">保存する</button>
    ${multi?`<button class="del" onclick="delProfile('${id}')">この農家を削除（データも消えます）</button>`:''}
    <button class="ghost" style="margin-top:8px" onclick="openSettings()">← 設定に戻る</button>`);
}
function saveProfile(){
  const name=document.getElementById('pf-name').value.trim();
  if(!name){toast('農家名を入力してください');return}
  const ps=getProfiles();const i=ps.findIndex(p=>p.id===_editProfileId);if(i<0)return;
  ps[i]={...ps[i],name,region:document.getElementById('pf-region').value.trim(),tel:document.getElementById('pf-tel').value.trim(),
    scale:document.getElementById('pf-scale').value.trim(),crops:document.getElementById('pf-crops').value.trim(),memo:document.getElementById('pf-memo').value.trim()};
  setProfiles(ps);
  if(_editProfileId===activeId){DATA.meta.farm=name;DATA.meta.loc=ps[i].region||DATA.meta.loc;save()}
  render();toast('保存しました');openSettings();
}
function delProfile(id){
  const ps=getProfiles();if(ps.length<=1){toast('最後の農家は削除できません');return}
  if(!confirm('この農家とそのデータを完全に削除しますか？'))return;
  try{localStorage.removeItem('victoryagri_data_'+id)}catch(e){}
  setProfiles(ps.filter(p=>p.id!==id));
  if(id===activeId){activeId=getProfiles()[0].id;try{localStorage.setItem(LS_ACTIVE,activeId)}catch(e){}DATA=load()}
  go('home');closeSheet();toast('削除しました');
}
function addCrop(){const n=prompt('作物名は？');if(!n)return;const k=confirm('果樹ですか？（キャンセル＝野菜）')?'果樹':'葉物';const u=prompt('単位は？（kg / 玉 / 袋 など）','kg')||'kg';
  const palette=['#F2A027','#EAB308','#2E7D46','#3B9C57','#1E5C32','#2A7FB8','#C8492F'];
  DATA.crops.push({id:uid(),name:n.trim(),kind:k,unit:u.trim(),color:palette[DATA.crops.length%palette.length]});save();openSettings()}
function delCrop(id){if(DATA.shipments.some(s=>s.cropId===id)||DATA.worklogs.some(w=>w.cropId===id)){if(!confirm('この作物の記録があります。マスタから外しても記録は残ります。続けますか？'))return}else if(!confirm('削除しますか？'))return;DATA.crops=DATA.crops.filter(c=>c.id!==id);save();openSettings()}
function addBuyer(){const n=prompt('出荷先の名前は？');if(!n)return;const t=prompt('種類は？（直売所 / 飲食店 / JA / 個人 / EC / 市場）','直売所')||'直売所';DATA.buyers.push({id:uid(),name:n.trim(),type:t.trim()});save();openSettings()}
function delBuyer(id){if(!confirm('削除しますか？'))return;DATA.buyers=DATA.buyers.filter(b=>b.id!==id);save();openSettings()}
let _editFieldId=null;
function openFieldForm(id){

  const sops=SOIL_TYPES.map(s=>`<option ${s===f.soil?'selected':''}>${s}</option>`).join('');
  openSheet(`<h3>🟤 ${id?'圃場を編集':'圃場を追加'}</h3>
    <div class="fld"><label>圃場名</label><input id="ff-name" value="${esc(f.name)}" placeholder="第1ハウス・露地A など"></div>
    <div class="fld"><label>土の種類</label><select id="ff-soil">${sops}</select></div>
    <div class="two">
      <div class="fld"><label>pH</label><input id="ff-ph" type="number" step="0.1" inputmode="decimal" value="${f.ph}" placeholder="6.0"></div>
      <div class="fld"><label>面積（任意）</label><input id="ff-area" value="${esc(f.area||'')}" placeholder="3a・5畝 など"></div>
    </div>
    <div class="fld"><label>メモ（任意）</label><input id="ff-memo" value="${esc(f.memo||'')}" placeholder="主な作物・水はけ など"></div>

    ${id?'<button class="del" onclick="delField()">この圃場を削除</button>':''}
    <button class="ghost" style="margin-top:8px" onclick="openSettings()">← 設定に戻る</button>`);
}
function saveField(){
  const name=document.getElementById('ff-name').value.trim();
  if(!name){toast('圃場名を入力してください');return}

function delField(){if(!confirm('この圃場を削除しますか？（記録は残ります）'))return;DATA.fields=DATA.fields.filter(f=>f.id!==_editFieldId);save();openSettings();toast('削除しました')}
function _showFieldInfo(){const el=document.getElementById('field-info');if(!el)return;const f=DATA.fields.find(x=>x.name===document.getElementById('f-field').value);el.innerHTML=f?`🟤 ${esc(f.soil||'')}${f.ph?' ・ pH '+f.ph:''}${f.area?' ・ '+esc(f.area):''}`:''}

/* ============ CSV ============ */
function exportCSV(){
  const ms=shipOfMonth(salesMonth);
  const me=expOfMonth(salesMonth);
  if(!ms.length&&!me.length){toast('この月の記録はありません');return}
  let rows=[['日付','区分','費目・作物','数量','単位','単価','金額','相手先','入金','メモ']];
  const all=[...ms.map(s=>({k:'売上',o:s})),...me.map(e=>({k:'費用',o:e}))].sort((a,b)=>a.o.date<b.o.date?-1:1);
  all.forEach(x=>{
    if(x.k==='売上'){const s=x.o,c=crop(s.cropId),b=buyer(s.buyerId);
      rows.push([s.date,'売上',c.name,s.qty,s.unit,s.unitPrice,s.amount,b.name,s.paid?'入金済':'未入金',s.note||''])}
    else{const e=x.o;rows.push([e.date,'費用',e.cat,'','','',-e.amount,e.vendor||'','',e.note||''])}
  });
  const tot=ms.reduce((a,s)=>a+s.amount,0),exp=me.reduce((a,e)=>a+e.amount,0);
  rows.push([]);rows.push(['','合計','','','','','売上 '+tot]);rows.push(['','','','','','','費用 '+exp]);rows.push(['','','','','','','利益 '+(tot-exp)]);
  const csv='﻿'+rows.map(r=>r.map(x=>`"${String(x==null?'':x).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`収支_${salesMonth}.csv`;a.click();toast('CSVを書き出しました ⬇');
}

let _tt;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),1900)}

render();
</script>
