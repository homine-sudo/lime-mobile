<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="victory縺ゅ＄繧・>
<title>victory縺ゅ＄繧・/title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='26' fill='%23fff'/%3E%3Crect x='45' y='57' width='6.5' height='14' rx='1.5' fill='%23A5CE6B'/%3E%3Crect x='54.5' y='50' width='6.5' height='21' rx='1.5' fill='%238FB73E'/%3E%3Crect x='64' y='42' width='6.5' height='29' rx='1.5' fill='%235E9E26'/%3E%3Cpath d='M18 40 L40 66 L80 22' fill='none' stroke='%232E7D46' stroke-width='11' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2A26; --sub:#7C786E; --line:#EDE6D6;
  --green:#2E7D46; --green-d:#1E5C32; --green-l:#E6F2E8;
  --mango:#F2A027; --mango-d:#B9700C; --mango-l:#FCEFD8;
  --sea:#2A7FB8; --sea-l:#E2F0F8;
  --red:#C8492F; --red-l:#FBE9E4;
  --shadow:0 2px 10px rgba(60,50,30,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  background:var(--bg);color:var(--ink);font-size:16px;line-height:1.6;
  padding-bottom:84px;-webkit-text-size-adjust:100%}
.wrap{max-width:520px;margin:0 auto;min-height:100vh;position:relative}

/* header */
.hdr{position:sticky;top:0;z-index:30;background:var(--green);color:#fff;
  padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.hdr .logo{font-size:22px;display:flex;align-items:center}
.hdr .logo svg{display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,.18))}
.hdr h1{font-size:19px;margin:0;font-weight:800;flex:1;letter-spacing:.02em}
.hdr .ver{font-size:11px;opacity:.8}
.pbar{position:sticky;top:54px;z-index:29;display:flex;align-items:center;justify-content:space-between;
  background:var(--green-l);color:var(--green-d);padding:7px 16px;font-size:13px;border-bottom:1px solid #D6E6CF;cursor:pointer}
.pbar b{font-weight:800}
.pbar .pbar-sw{font-weight:700;background:var(--card);border:1px solid #CFE0C6;border-radius:14px;padding:2px 11px;font-size:12px}
.hdr .gear{background:rgba(255,255,255,.18);border:none;color:#fff;width:38px;height:38px;
  border-radius:11px;font-size:19px;display:flex;align-items:center;justify-content:center}

/* screen */
.screen{padding:14px 14px 24px;display:none;animation:fade .18s ease}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.sec-t{font-size:13px;color:var(--sub);font-weight:700;margin:18px 4px 8px;letter-spacing:.05em}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:15px;box-shadow:var(--shadow);margin-bottom:12px}

/* weather card */
.wcard{background:linear-gradient(135deg,#3E97D1,#2A7FB8);color:#fff;border:none}
.wcard .top{display:flex;align-items:center;gap:12px}
.wcard .ic{font-size:40px;line-height:1}
.wcard .tmp{font-size:30px;font-weight:800}
.wcard .desc{font-size:14px;opacity:.95}
.wcard .row{display:flex;gap:8px;margin-top:10px;font-size:12px;opacity:.95;flex-wrap:wrap}
.wcard .pill{background:rgba(255,255,255,.2);padding:3px 9px;border-radius:20px}
.alert{background:var(--red);color:#fff;border-radius:14px;padding:11px 13px;margin-bottom:12px;
  display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;box-shadow:var(--shadow)}
.alert.warn{background:var(--mango)}

/* KPI */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:var(--shadow)}
.kpi .lbl{font-size:12px;color:var(--sub);font-weight:600}
.kpi .num{font-size:24px;font-weight:800;margin-top:2px}
.kpi .num.green{color:var(--green-d)} .kpi .num.mango{color:var(--mango-d)}
.kpi .sub{font-size:11px;color:var(--sub);margin-top:1px}

/* quick add */
.qrow{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:4px}
.qbtn{border:none;border-radius:16px;padding:15px 8px;font-size:15px;font-weight:700;
  color:#fff;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:var(--shadow)}
.qbtn .ic{font-size:25px}
.qbtn.ship{background:var(--mango)} .qbtn.work{background:var(--green)} .qbtn.cost{background:#8A6D3B}

/* feed */
.feed{display:flex;flex-direction:column;gap:8px}
.item{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;
  display:flex;align-items:center;gap:11px;box-shadow:var(--shadow)}
.item .dot{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0}
.item .dot.ship{background:var(--mango-l)} .item .dot.work{background:var(--green-l)}
.item .body{flex:1;min-width:0}
.item .ttl{font-size:15px;font-weight:700}
.item .meta{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .amt{font-size:15px;font-weight:800;color:var(--mango-d);white-space:nowrap}
.item .amt.unpaid{color:var(--red)}
.empty{text-align:center;color:var(--sub);font-size:14px;padding:30px 10px}

/* list head */
.lh{display:flex;align-items:center;justify-content:space-between;margin:4px 4px 10px}
.lh h2{font-size:19px;margin:0;font-weight:800}
.addbtn{background:var(--green);color:#fff;border:none;border-radius:12px;padding:9px 15px;
  font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow)}

/* chips */
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 10px;-ms-overflow-style:none;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:6px 13px;font-size:13px;font-weight:600;color:var(--sub)}
.chip.on{background:var(--green);color:#fff;border-color:var(--green)}

/* sales */
.bigamt{font-size:34px;font-weight:800;color:var(--green-d);text-align:center;margin:6px 0 2px}
.bigamt-sub{text-align:center;color:var(--sub);font-size:13px;margin-bottom:6px}
.brk{display:flex;align-items:center;gap:10px;padding:9px 2px;border-top:1px solid var(--line)}
.brk .nm{flex:1;font-size:14px;font-weight:600}
.brk .bar{height:8px;border-radius:5px;background:var(--green);flex:none}
.brk .vl{font-size:14px;font-weight:700;width:96px;text-align:right}
.monthnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.monthnav button{background:var(--card);border:1px solid var(--line);border-radius:11px;width:42px;height:42px;font-size:20px;font-weight:700;color:var(--ink)}
.monthnav .m{font-size:18px;font-weight:800}

/* bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--card);
  border-top:1px solid var(--line);display:flex;max-width:520px;margin:0 auto;
  padding-bottom:env(safe-area-inset-bottom,0)}
.nav button{flex:1;background:none;border:none;padding:9px 0 7px;display:flex;flex-direction:column;
  align-items:center;gap:2px;color:var(--sub);font-size:11px;font-weight:600}
.nav button .ic{font-size:23px}
.nav button.on{color:var(--green)}

/* FAB */
.fab{position:fixed;right:calc(50% - 248px);bottom:90px;z-index:39;width:60px;height:60px;border-radius:50%;
  background:var(--mango);color:#fff;border:none;font-size:32px;box-shadow:0 6px 18px rgba(242,160,39,.45);
  display:flex;align-items:center;justify-content:center}
@media(max-width:520px){.fab{right:18px}}

/* modal */
.ov{position:fixed;inset:0;z-index:50;background:rgba(40,35,25,.45);display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:520px;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;
  padding:8px 16px calc(20px + env(safe-area-inset-bottom,0));animation:up .25s ease}
@keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
.grab{width:42px;height:5px;border-radius:3px;background:#D9D2C4;margin:8px auto 6px}
.sheet h3{font-size:19px;margin:4px 2px 14px;font-weight:800}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;
  padding:12px 13px;font-size:16px;background:var(--card);color:var(--ink);font-family:inherit}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--green)}
.fld textarea{min-height:60px;resize:vertical}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg{display:flex;gap:7px;flex-wrap:wrap}
.seg button{flex:1;min-width:72px;border:1.5px solid var(--line);background:var(--card);border-radius:12px;
  padding:11px 6px;font-size:14px;font-weight:700;color:var(--sub)}
.seg button.on{background:var(--green-l);border-color:var(--green);color:var(--green-d)}
.save{width:100%;background:var(--green);color:#fff;border:none;border-radius:14px;padding:15px;
  font-size:17px;font-weight:800;margin-top:6px;box-shadow:var(--shadow)}
.del{width:100%;background:none;color:var(--red);border:none;padding:12px;font-size:15px;font-weight:700;margin-top:4px}
.amtprev{background:var(--mango-l);border-radius:12px;padding:11px 14px;text-align:center;margin-bottom:13px}
.amtprev .v{font-size:26px;font-weight:800;color:var(--mango-d)}
.amtprev .l{font-size:12px;color:var(--mango-d);font-weight:600}
.photo-prev{width:100%;border-radius:12px;margin-top:8px;display:none}
.ghost{background:var(--card);border:1.5px dashed var(--line);color:var(--sub);border-radius:12px;
  padding:13px;width:100%;font-size:15px;font-weight:600}

/* master rows */
.mrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:10px 12px;margin-bottom:8px}
.mrow .sw{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.mrow .nm{flex:1;font-weight:700;font-size:15px}
.mrow .ty{font-size:12px;color:var(--sub)}
.mrow .x{background:none;border:none;color:var(--red);font-size:18px;padding:2px 6px}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:60;
  background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-size:15px;font-weight:600;
  opacity:0;transition:opacity .2s;box-shadow:0 6px 20px rgba(0,0,0,.25);pointer-events:none}
.toast.on{opacity:1}
.note{font-size:12px;color:var(--sub);text-align:center;margin:14px 4px;line-height:1.7}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;margin-left:6px}
.tag.unpaid{background:var(--red-l);color:var(--red)}
.tag.paid{background:var(--green-l);color:var(--green-d)}

/* market */
.mkt-note{font-size:12px;color:#3a5a40;background:var(--green-l);border-radius:12px;padding:11px 13px;margin-bottom:12px;line-height:1.6}
.mkt-hint{font-size:12.5px;color:#1f4d70;background:var(--sea-l);border:1px solid #BFDDEF;border-radius:11px;padding:9px 12px;margin:-4px 0 13px;line-height:1.55}
.mkt-hint b{color:#0C447C}
.mkt-hint .hi{color:var(--green-d);font-weight:700} .mkt-hint .lo{color:var(--red);font-weight:700}
.mkt-note b{color:var(--green-d)}
.mrank{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.mrk{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid var(--line)}
.mrank .mrk:last-child{border-bottom:none}
.mrk.on{background:var(--green-l)}
.mrk .rkn{font-size:16px;font-weight:800;color:var(--green-d);width:18px;text-align:center;flex-shrink:0}
.mrk .em{font-size:21px;width:26px;text-align:center;flex-shrink:0}
.mrk .info{flex:1;min-width:0}
.mrk .nm{font-weight:700;font-size:15px}
.mtag{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;margin-left:5px;vertical-align:1px;white-space:nowrap}
.mtag.win{background:var(--green-l);color:var(--green-d)}
.mtag.vol{background:var(--sea-l);color:var(--sea)}
.mtag.niche{background:var(--mango-l);color:var(--mango-d)}
.mtag.mine{background:#FDEBD0;color:var(--mango-d);border:1px solid var(--mango)}
.mrk .sub{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrk .sc{font-size:18px;font-weight:800;color:var(--green-d);width:30px;text-align:right;flex-shrink:0}
.mcal{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-top:6px}
.mcal .mh{text-align:center;font-size:9px;color:var(--sub);font-weight:700}
.mcal .cell{border-radius:4px;text-align:center;padding:6px 0 5px;font-size:9.5px;font-weight:700;background:#ECE6D8;color:#B7AE99;line-height:1.15}
.mcal .cell small{font-size:7.5px;font-weight:600;opacity:.9;display:block}
.mlegend{display:flex;gap:11px;flex-wrap:wrap;font-size:11px;color:var(--sub);margin-top:10px;align-items:center}
.mlegend .sw{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:-2px;margin-right:3px}
.mkpi{display:flex;gap:8px;margin:13px 0 2px;flex-wrap:wrap}
.mkpi .k{flex:1;min-width:78px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:8px 10px}
.mkpi .k .l{font-size:10px;color:var(--sub);font-weight:600}
.mkpi .k .v{font-size:17px;font-weight:800;color:var(--green-d)}
.mseg{display:flex;gap:0;background:#EFEDE3;border-radius:10px;padding:3px;margin:0 0 10px}
.mseg button{flex:1;border:none;background:none;border-radius:8px;padding:7px 4px;font-size:12.5px;font-weight:700;color:var(--sub)}
.mseg button.on{background:var(--card);color:var(--green-d);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.mtop{display:flex;gap:0;background:#E8EFE6;border-radius:12px;padding:3px;margin:0 0 12px}
.mtop button{flex:1;border:none;background:none;border-radius:10px;padding:9px 4px;font-size:14px;font-weight:800;color:var(--sub)}
.mtop button.on{background:var(--green);color:#fff;box-shadow:var(--shadow)}
.wyr{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.wyr button{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:6px 10px;font-size:12px;font-weight:700;color:var(--sub)}
.wyr button.on{background:var(--red-l);border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <span class="logo"><svg viewBox="0 0 100 100" width="34" height="34" aria-label="victory縺ゅ＄繧・><defs><linearGradient id="vg" x1="20" y1="66" x2="82" y2="20" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#1E5C32"/><stop offset="1" stop-color="#7CB342"/></linearGradient><marker id="vah" markerUnits="userSpaceOnUse" markerWidth="24" markerHeight="24" refX="7" refY="12" orient="auto"><path d="M2 2 L21 12 L2 22 L8 12 Z" fill="#7CB342"/></marker></defs><rect x="2" y="2" width="96" height="96" rx="26" fill="#fff"/><rect x="45" y="57" width="6.5" height="14" rx="1.5" fill="#A5CE6B"/><rect x="54.5" y="50" width="6.5" height="21" rx="1.5" fill="#8FB73E"/><rect x="64" y="42" width="6.5" height="29" rx="1.5" fill="#5E9E26"/><path d="M18 40 L40 66 L78 24" fill="none" stroke="url(#vg)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#vah)"/></svg></span>
    <h1>victory<span style="font-weight:700;opacity:.92">縺ゅ＄繧・/span></h1>
    <span class="ver" id="ver"></span>
    <button class="gear" onclick="openSettings()">笞呻ｸ・/button>
  </div>
  <div class="pbar" onclick="openProfiles()">
    <span>側 <b id="who-name">霎ｲ螳ｶ</b> 縺ｮ逡・/span>
    <span class="pbar-sw">蛻・崛 笆ｾ</span>
  </div>

  <!-- HOME -->
  <div class="screen on" id="s-home"></div>

</div>

  <div class="sheet" id="sheet"></div>

<script>
const APP_VERSION='2026-06-13i';
/* ===== 霎ｲ螳ｶ繝励Ο繝輔ぅ繝ｼ繝ｫ・郁､・焚霎ｲ螳ｶ繝ｻ繝・・繧ｿ蛻・屬・・====
   螟夜Κ繝・・繧ｿ(逶ｸ蝣ｴ/豌玲ｸｩ/譌ｧ證ｦ=繧ｳ繝ｼ繝牙・)縺ｯ蜈ｨ霎ｲ螳ｶ蜈ｱ騾壹・   蜷・ｾｲ螳ｶ縺ｮ蜈･蜉帙ョ繝ｼ繧ｿ縺ｯ victoryagri_data_<id> 縺ｫ蛻・屬菫晏ｭ倥＆繧後∽ｺ偵＞縺ｫ豺ｷ縺悶ｉ縺ｪ縺・・*/
const LS_PROFILES='victoryagri_profiles', LS_ACTIVE='victoryagri_active', LS_OLD='shimaagri_v1';
let activeId='';
function getProfiles(){try{return JSON.parse(localStorage.getItem(LS_PROFILES))||[]}catch(e){return[]}}
function setProfiles(p){try{localStorage.setItem(LS_PROFILES,JSON.stringify(p))}catch(e){}}
function dataKey(){return 'victoryagri_data_'+activeId}
function activeProfile(){return getProfiles().find(p=>p.id===activeId)||{name:'霎ｲ螳ｶ',region:'豐也ｸ・恁'}}
function ensureProfile(){
  let ps=getProfiles();
  if(!ps.length){
    let old=null;try{old=localStorage.getItem(LS_OLD)}catch(e){}
    let name='霎ｲ螳ｶ1';if(old){try{name=(JSON.parse(old).meta||{}).farm||'霎ｲ螳ｶ1'}catch(e){}}
    const id='f'+Math.random().toString(36).slice(2,9);
    ps=[{id,name,region:'豐也ｸ・恁',tel:'',crops:'',scale:'',memo:''}];
    setProfiles(ps);
    if(old){try{localStorage.setItem('victoryagri_data_'+id,old)}catch(e){}}
    activeId=id;try{localStorage.setItem(LS_ACTIVE,id)}catch(e){}
  }
  activeId=localStorage.getItem(LS_ACTIVE)||'';
  if(!activeId||!ps.some(p=>p.id===activeId)){activeId=ps[0].id;try{localStorage.setItem(LS_ACTIVE,activeId)}catch(e){}}
}
const UNITS=['kg','邇・,'陲・,'譛ｬ','邂ｱ','繧ｱ繝ｼ繧ｹ','譚・];
const WORK_TYPES=[
  {k:'蜿守ｩｫ',ic:'ｧｺ'},{k:'髦ｲ髯､',ic:'挑'},{k:'譁ｽ閧･',ic:'諺'},

function mPriceColor(p,min,max){if(p==null)return null;const t=(p-min)/((max-min)||1);

/* 譬ｪ萓｡繝√Ε繝ｼ繝磯｢ｨ・壻ｾ｡譬ｼ縺ｮ謚倥ｌ邱夲ｼ倶ｸ九↓蜃ｺ譚･鬮倥ヰ繝ｼ・・VG・・*/
function buildPriceChart(it){
  const W=360,padL=8,padR=12,topP=16,priceB=148,volT=170,volB=210;
  const xs=i=>padL+i*((W-padL-padR)/11);
  const pv=it.price.filter(x=>x!=null);
  if(!pv.length)return '<div class="empty">萓｡譬ｼ繝・・繧ｿ縺ｪ縺・/div>';
  const pmin=Math.min(...pv),pmax=Math.max(...pv),yspan=(pmax-pmin)||1;
  const yFor=p=>priceB-(p-pmin)/yspan*(priceB-topP);
  // 繧ｰ繝ｪ繝・ラ・仰･逶ｮ逶・  let grid='';
  const gridVals=(pmax===pmin)?[pmax]:[pmin,(pmin+pmax)/2,pmax];
  gridVals.forEach(val=>{const y=yFor(val);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#E8E1D3" stroke-width="1"/>`;
    grid+=`<text x="${W-padR+1}" y="${(y+3).toFixed(1)}" text-anchor="start" font-size="8" fill="#A89F8C">ﾂ･${Math.round(val)}</text>`;});
  // 謚倥ｌ邱夲ｼ九お繝ｪ繧｢・域ｬ貂ｬ譛医〒蛹ｺ蛻・ｋ・・  let paths='',seg=[];
  const flush=()=>{
    if(seg.length>1){
      const d='M'+seg.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('L');
      paths+=`<path d="${d}L${seg[seg.length-1].x.toFixed(1)},${priceB}L${seg[0].x.toFixed(1)},${priceB}Z" fill="url(#pgrad)"/>`;
      paths+=`<path d="${d}" fill="none" stroke="#2E7D46" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
    seg.forEach(p=>paths+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.3" fill="#2E7D46"/>`);
    seg=[];
  };
  it.price.forEach((p,i)=>{if(p==null)flush();else seg.push({x:xs(i),y:yFor(p)})});
  flush();
  // 鬮伜､・郁ｵ､・峨・螳牙､・磯搨・峨・繝ｼ繧ｫ繝ｼ
  const hiI=it.price.indexOf(pmax),loI=it.price.indexOf(pmin);let marks='';
  if(hiI>=0){const x=xs(hiI),y=yFor(pmax);
    marks+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="#C8492F"/>`;
    marks+=`<text x="${Math.min(Math.max(x,18),W-26).toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#C8492F">ﾂ･${pmax}</text>`;}
  if(loI>=0&&loI!==hiI){const x=xs(loI),y=yFor(pmin);
    marks+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.6" fill="#2A7FB8"/>`;
    marks+=`<text x="${Math.min(Math.max(x,18),W-26).toFixed(1)}" y="${(y+13).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2A7FB8">ﾂ･${pmin}</text>`;}
  // 蜃ｺ譚･鬮倥ヰ繝ｼ
  const vmax=Math.max(...it.vol.map(v=>v||0))||1;let vol='';
  it.price.forEach((p,i)=>{const v=it.vol[i];if(v==null)return;
    const bh=Math.max(2,(v/vmax)*(volB-volT)),x=xs(i);
    vol+=`<rect x="${(x-7).toFixed(1)}" y="${(volB-bh).toFixed(1)}" width="14" height="${bh.toFixed(1)}" rx="2" fill="#9CC76B"/>`;});
  let ax='';for(let i=0;i<12;i++)ax+=`<text x="${xs(i).toFixed(1)}" y="${(volB+13).toFixed(1)}" text-anchor="middle" font-size="8.5" fill="#A89F8C">${i+1}</text>`;
  return `<svg viewBox="0 0 ${W} 228" width="100%" style="display:block">
    <defs><linearGradient id="pgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E7D46" stop-opacity="0.26"/><stop offset="1" stop-color="#2E7D46" stop-opacity="0.02"/></linearGradient></defs>
    ${grid}${paths}${marks}
    <text x="${padL}" y="${(volT-3).toFixed(1)}" font-size="8" fill="#A89F8C">蜃ｺ闕ｷ驥擾ｼ・・・/text>${vol}${ax}</svg>`;
}

/* 譬ｪ萓｡繝√Ε繝ｼ繝磯｢ｨ・夐℃蜴ｻ10蟷ｴ縺ｮ蟷ｴ蟷ｳ蝮・腰萓｡・域釜繧檎ｷ壹・SVG・・*/
function buildYearChart(annual){
  const W=360,padL=8,padR=14,topP=16,base=150;
  const n=annual.length, xs=i=>padL+i*((W-padL-padR)/(n-1));
  const vmin=Math.min(...annual),vmax=Math.max(...annual),span=(vmax-vmin)||1;
  const yFor=v=>base-(v-vmin)/span*(base-topP);
  let grid='';
  [vmin,(vmin+vmax)/2,vmax].forEach(v=>{const y=yFor(v);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#E8E1D3"/>`;
    grid+=`<text x="${W-padR+1}" y="${(y+3).toFixed(1)}" font-size="8" fill="#A89F8C">ﾂ･${Math.round(v)}</text>`});
  const pts=annual.map((v,i)=>({x:xs(i),y:yFor(v),v}));
  const d='M'+pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('L');
  let g=`<path d="${d}L${pts[n-1].x.toFixed(1)},${base}L${pts[0].x.toFixed(1)},${base}Z" fill="url(#pgrad)"/>`;
  g+=`<path d="${d}" fill="none" stroke="#2E7D46" stroke-width="2.4" stroke-linejoin="round"/>`;
  pts.forEach(p=>g+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.3" fill="#2E7D46"/>`);
  const hiI=annual.indexOf(vmax),loI=annual.indexOf(vmin);
  g+=`<circle cx="${pts[hiI].x.toFixed(1)}" cy="${pts[hiI].y.toFixed(1)}" r="4" fill="#C8492F"/><text x="${Math.min(Math.max(pts[hiI].x,18),W-24).toFixed(1)}" y="${(pts[hiI].y-7).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#C8492F">ﾂ･${vmax}</text>`;
  g+=`<circle cx="${pts[loI].x.toFixed(1)}" cy="${pts[loI].y.toFixed(1)}" r="3.5" fill="#2A7FB8"/><text x="${Math.min(Math.max(pts[loI].x,18),W-24).toFixed(1)}" y="${(pts[loI].y+13).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2A7FB8">ﾂ･${vmin}</text>`;
  let ax='';annual.forEach((v,i)=>{if(i%2===0||i===n-1)ax+=`<text x="${xs(i).toFixed(1)}" y="172" text-anchor="middle" font-size="8" fill="#A89F8C">${ANNUAL_Y0+i}</text>`});
  return `<svg viewBox="0 0 ${W} 180" width="100%" style="display:block">
    <defs><linearGradient id="pgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2E7D46" stop-opacity="0.26"/><stop offset="1" stop-color="#2E7D46" stop-opacity="0.02"/></linearGradient></defs>${grid}${g}${ax}</svg>`;
}

/* 譬ｪ萓｡繝√Ε繝ｼ繝磯｢ｨ・夐℃蜴ｻ10蟷ｴ縺ｮ譛亥ｹｳ蝮・ｰ玲ｸｩ・・20繝ｶ譛医・騾｣邯壽釜繧檎ｷ壹・SVG・・*/
function buildLongTempChart(wx,yearsArg){
  const years=(yearsArg||Object.keys(wx).map(Number)).sort();
  const series=[];years.forEach(y=>wx[y].forEach((t,mi)=>series.push({y,mi,t})));
  const W=360,padL=8,padR=20,topP=12,base=150;
  const n=series.length, xs=i=>padL+i*((W-padL-padR)/(n-1));
  const tmin=Math.floor(Math.min(...series.map(s=>s.t))),tmax=Math.ceil(Math.max(...series.map(s=>s.t))),span=(tmax-tmin)||1;
  const yFor=t=>base-(t-tmin)/span*(base-topP);
  let grid='';
  [tmin,(tmin+tmax)/2,tmax].forEach(t=>{const y=yFor(t);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#E8E1D3"/>`;
    grid+=`<text x="${W-padR+1}" y="${(y+3).toFixed(1)}" font-size="8" fill="#A89F8C">${Math.round(t)}邃・/text>`});
  const d='M'+series.map((s,i)=>`${xs(i).toFixed(1)},${yFor(s.t).toFixed(1)}`).join('L');
  let g=`<path d="${d}L${xs(n-1).toFixed(1)},${base}L${padL},${base}Z" fill="url(#tgrad)"/>`;
  g+=`<path d="${d}" fill="none" stroke="#C0492F" stroke-width="1.5" stroke-linejoin="round"/>`;
  // 蟷ｴ繝ｩ繝吶Ν・句ｹｴ蛹ｺ蛻・ｊ
  let ax='';years.forEach((y,yi)=>{const i=yi*12+6;if(yi%2===0||yi===years.length-1)ax+=`<text x="${xs(i).toFixed(1)}" y="172" text-anchor="middle" font-size="8" fill="#A89F8C">${y}</text>`;
    if(yi>0)g+=`<line x1="${xs(yi*12).toFixed(1)}" y1="${topP}" x2="${xs(yi*12).toFixed(1)}" y2="${base}" stroke="#F0EADC"/>`});
  return `<svg viewBox="0 0 ${W} 180" width="100%" style="display:block">
    <defs><linearGradient id="tgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C0492F" stop-opacity="0.20"/><stop offset="1" stop-color="#C0492F" stop-opacity="0.02"/></linearGradient></defs>${grid}${g}${ax}</svg>`;
}

function buildTempYearChart(vals,years){
  const W=360,padL=8,padR=20,topP=14,base=140;const n=vals.length,xs=i=>padL+i*((W-padL-padR)/(n-1));
  const lo=Math.floor(Math.min(...vals)*10)/10-0.2,hi=Math.ceil(Math.max(...vals)*10)/10+0.2,span=(hi-lo)||1;
  const yF=v=>base-(v-lo)/span*(base-topP);
  let g='';[lo,(lo+hi)/2,hi].forEach(v=>{const y=yF(v);g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#E8E1D3"/><text x="${W-padR+1}" y="${(y+3).toFixed(1)}" font-size="8" fill="#A89F8C">${v.toFixed(1)}邃・/text>`});
  const d='M'+vals.map((v,i)=>`${xs(i).toFixed(1)},${yF(v).toFixed(1)}`).join('L');
  g+=`<path d="${d}" fill="none" stroke="#C0492F" stroke-width="2.2"/>`;
  vals.forEach((v,i)=>g+=`<circle cx="${xs(i).toFixed(1)}" cy="${yF(v).toFixed(1)}" r="2.3" fill="#C0492F"/>`);
  let ax='';years.forEach((y,i)=>{if(i%2===0||i===n-1)ax+=`<text x="${xs(i).toFixed(1)}" y="162" text-anchor="middle" font-size="8" fill="#A89F8C">${y}</text>`});
  return `<svg viewBox="0 0 ${W} 170" width="100%" style="display:block">${g}${ax}</svg>`;
}
function buildMonthTempChart(yr,avg){
  const W=360,padL=8,padR=20,topP=12,base=140;const xs=i=>padL+i*((W-padL-padR)/11);
  const all=yr.concat(avg),lo=Math.floor(Math.min(...all))-1,hi=Math.ceil(Math.max(...all))+1,span=(hi-lo)||1;
  const yF=v=>base-(v-lo)/span*(base-topP);
  let g='';[lo,(lo+hi)/2,hi].forEach(v=>{const y=yF(v);g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#E8E1D3"/><text x="${W-padR+1}" y="${(y+3).toFixed(1)}" font-size="8" fill="#A89F8C">${Math.round(v)}邃・/text>`});
  const dA='M'+avg.map((v,i)=>`${xs(i).toFixed(1)},${yF(v).toFixed(1)}`).join('L');
  g+=`<path d="${dA}" fill="none" stroke="#B3AC9B" stroke-width="1.5" stroke-dasharray="4 3"/>`;
  const dY='M'+yr.map((v,i)=>`${xs(i).toFixed(1)},${yF(v).toFixed(1)}`).join('L');
  g+=`<path d="${dY}" fill="none" stroke="#C0492F" stroke-width="2.2"/>`;
  yr.forEach((v,i)=>g+=`<circle cx="${xs(i).toFixed(1)}" cy="${yF(v).toFixed(1)}" r="2.2" fill="#C0492F"/>`);
  let ax='';for(let i=0;i<12;i++)ax+=`<text x="${xs(i).toFixed(1)}" y="158" text-anchor="middle" font-size="8" fill="#A89F8C">${i+1}</text>`;
  return `<svg viewBox="0 0 ${W} 166" width="100%" style="display:block">${g}${ax}</svg>`;
}

  else s='縺ｻ縺ｼ蟷ｳ蟷ｴ荳ｦ縺ｿ縲ゆｾ句ｹｴ縺ｩ縺翫ｊ縺ｮ邂｡逅・〒OK縲・;

function openFieldForm(id){
  _editFieldId=id||null;
  const f=id?DATA.fields.find(x=>x.id===id):{name:'',soil:SOIL_TYPES[0],ph:'',area:'',memo:''};
  const sops=SOIL_TYPES.map(s=>`<option ${s===f.soil?'selected':''}>${s}</option>`).join('');
  openSheet(`<h3>洟 ${id?'蝨・ｴ繧堤ｷｨ髮・:'蝨・ｴ繧定ｿｽ蜉'}</h3>
    <div class="fld"><label>蝨・ｴ蜷・/label><input id="ff-name" value="${esc(f.name)}" placeholder="隨ｬ1繝上え繧ｹ繝ｻ髴ｲ蝨ｰA 縺ｪ縺ｩ"></div>
    <div class="fld"><label>蝨溘・遞ｮ鬘・/label><select id="ff-soil">${sops}</select></div>
    <div class="two">
      <div class="fld"><label>pH</label><input id="ff-ph" type="number" step="0.1" inputmode="decimal" value="${f.ph}" placeholder="6.0"></div>
      <div class="fld"><label>髱｢遨搾ｼ井ｻｻ諢擾ｼ・/label><input id="ff-area" value="${esc(f.area||'')}" placeholder="3a繝ｻ5逡・縺ｪ縺ｩ"></div>
    </div>
    <div class="fld"><label>繝｡繝｢・井ｻｻ諢擾ｼ・/label><input id="ff-memo" value="${esc(f.memo||'')}" placeholder="荳ｻ縺ｪ菴懃黄繝ｻ豌ｴ縺ｯ縺・縺ｪ縺ｩ"></div>
    <button class="save" onclick="saveField()">${id?'菫晏ｭ倥☆繧・:'霑ｽ蜉縺吶ｋ'}</button>
    ${id?'<button class="del" onclick="delField()">縺薙・蝨・ｴ繧貞炎髯､</button>':''}
    <button class="ghost" style="margin-top:8px" onclick="openSettings()">竊・險ｭ螳壹↓謌ｻ繧・/button>`);
}
function saveField(){
  const name=document.getElementById('ff-name').value.trim();
  if(!name){toast('蝨・ｴ蜷阪ｒ蜈･蜉帙＠縺ｦ縺上□縺輔＞');return}
  const o={id:_editFieldId||uid(),name,soil:document.getElementById('ff-soil').value,
    ph:parseFloat(document.getElementById('ff-ph').value)||'',area:document.getElementById('ff-area').value.trim(),memo:document.getElementById('ff-memo').value.trim()};
  if(_editFieldId){const i=DATA.fields.findIndex(f=>f.id===_editFieldId);DATA.fields[i]=o}else DATA.fields.push(o);
  save();openSettings();toast('菫晏ｭ倥＠縺ｾ縺励◆');
}
function delField(){if(!confirm('縺薙・蝨・ｴ繧貞炎髯､縺励∪縺吶°・滂ｼ郁ｨ倬鹸縺ｯ谿九ｊ縺ｾ縺呻ｼ・))return;DATA.fields=DATA.fields.filter(f=>f.id!==_editFieldId);save();openSettings();toast('蜑企勁縺励∪縺励◆')}
function _showFieldInfo(){const el=document.getElementById('field-info');if(!el)return;const f=DATA.fields.find(x=>x.name===document.getElementById('f-field').value);el.innerHTML=f?`洟 ${esc(f.soil||'')}${f.ph?' 繝ｻ pH '+f.ph:''}${f.area?' 繝ｻ '+esc(f.area):''}`:''}

/* ============ CSV ============ */
function exportCSV(){
  const ms=shipOfMonth(salesMonth);
  const me=expOfMonth(salesMonth);
  if(!ms.length&&!me.length){toast('縺薙・譛医・險倬鹸縺ｯ縺ゅｊ縺ｾ縺帙ｓ');return}
  let rows=[['譌･莉・,'蛹ｺ蛻・,'雋ｻ逶ｮ繝ｻ菴懃黄','謨ｰ驥・,'蜊倅ｽ・,'蜊倅ｾ｡','驥鷹｡・,'逶ｸ謇句・','蜈･驥・,'繝｡繝｢']];
  const all=[...ms.map(s=>({k:'螢ｲ荳・,o:s})),...me.map(e=>({k:'雋ｻ逕ｨ',o:e}))].sort((a,b)=>a.o.date<b.o.date?-1:1);
  all.forEach(x=>{
    if(x.k==='螢ｲ荳・){const s=x.o,c=crop(s.cropId),b=buyer(s.buyerId);
      rows.push([s.date,'螢ｲ荳・,c.name,s.qty,s.unit,s.unitPrice,s.amount,b.name,s.paid?'蜈･驥第ｸ・:'譛ｪ蜈･驥・,s.note||''])}
    else{const e=x.o;rows.push([e.date,'雋ｻ逕ｨ',e.cat,'','','',-e.amount,e.vendor||'','',e.note||''])}
  });
  const tot=ms.reduce((a,s)=>a+s.amount,0),exp=me.reduce((a,e)=>a+e.amount,0);
  rows.push([]);rows.push(['','蜷郁ｨ・,'','','','','螢ｲ荳・'+tot]);rows.push(['','','','','','','雋ｻ逕ｨ '+exp]);rows.push(['','','','','','','蛻ｩ逶・'+(tot-exp)]);
  const csv='・ｿ'+rows.map(r=>r.map(x=>`"${String(x==null?'':x).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`蜿取髪_${salesMonth}.csv`;a.click();toast('CSV繧呈嶌縺榊・縺励∪縺励◆ 筮・);
}

let _tt;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),1900)}

render();
</script>
