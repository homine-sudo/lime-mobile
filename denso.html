<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="電装取付管理">
<meta name="format-detection" content="telephone=yes">
<meta name="theme-color" content="#0A0E1A">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>電装取付管理 — 現場/事務</title>
<link rel="apple-touch-icon" sizes="180x180" href="denso-icon.png">
<link rel="apple-touch-icon" href="denso-icon.png">
<link rel="icon" type="image/png" sizes="256x256" href="denso-icon.png">
<style>
/* ───── 電装(ELECTRO)カラーパレット ───── */
:root{
  --bg:#EEF1F7;
  --bg2:#F6F8FC;
  --card:#FFFFFF;
  --card2:#F1F4FA;
  --accent:#2563EB;
  --accent-light:#3B82F6;
  --accent-deep:#1D4ED8;
  --accent-dim:#EAF1FE;
  --accent-border:#C7DBFB;
  --lime:#15A34A;
  --text:#1B2433;
  --text-dim:#5B6B82;
  --muted:#9AA7B8;
  --red:#E5484D;
  --green:#16A34A;
  --orange:#D97706;
  --purple:#7C3AED;
  --border:#E4E9F1;
  --shadow-sm:0 1px 2px rgba(16,24,40,.05);
  --shadow-md:0 1px 2px rgba(16,24,40,.05),0 4px 14px rgba(16,24,40,.06);
  --shadow-lg:0 12px 34px rgba(16,24,40,.16);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;
  font-size:15px;color:var(--text);
  background:var(--bg);
  -webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font:inherit;color:inherit}
button{background:none;border:none;cursor:pointer;padding:0;user-select:none}
input,select,textarea{
  width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;
  background:var(--bg2);font-size:16px;color:var(--text);
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.15);
}
textarea{resize:vertical;min-height:70px;line-height:1.5}
a{color:var(--accent-light);text-decoration:none}
::placeholder{color:var(--muted)}

#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
.m-header{
  background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);
  border-bottom:1px solid var(--border);
  color:var(--text);height:56px;display:flex;align-items:center;
  padding:0 14px;gap:11px;flex-shrink:0;position:relative;z-index:10;
}
.m-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent-deep),var(--accent-light));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 2px 8px rgba(37,99,235,.35)}
.m-title{font-size:16px;letter-spacing:.2px;color:var(--text);font-weight:800;flex:1;line-height:1.15}
.m-title small{display:block;font-size:9.5px;letter-spacing:1.5px;color:var(--accent);font-weight:700;margin-top:1px}
.m-header-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border)}
.m-header-btn:active{background:#dbe7fd}

.m-main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 96px}
.page{display:none;animation:fadeIn .22s}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.page-h{font-size:20px;letter-spacing:-.3px;color:var(--text);font-weight:800;margin:4px 2px 15px;display:flex;align-items:center;gap:8px}

.m-bottomnav{
  position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);
  backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(4,1fr);
  padding:6px 0 calc(var(--safe-bottom) + 6px);z-index:20;box-shadow:0 -1px 0 rgba(16,24,40,.04),0 -8px 22px rgba(16,24,40,.05);
}
.m-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:7px 4px;font-size:11px;color:var(--muted);transition:color .15s,transform .12s;min-height:52px}
.m-tab:active{transform:scale(.92)}
.m-tab.active{color:var(--accent)}
.m-tab.active .icon{transform:scale(1.08)}
.m-tab .icon{font-size:21px;line-height:1;transition:transform .15s}
.m-tab .label{font-size:10.5px;letter-spacing:.5px;font-weight:600}

.m-fab{
  position:fixed;right:16px;bottom:calc(72px + var(--safe-bottom));z-index:25;
  height:54px;padding:0 20px;border-radius:27px;
  background:linear-gradient(135deg,var(--accent-deep),var(--accent));color:#fff;
  font-size:15px;font-weight:800;letter-spacing:.5px;
  box-shadow:0 6px 18px rgba(37,99,235,.42);display:flex;align-items:center;gap:6px;
}
.m-fab:active{transform:scale(.95)}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 17px;margin-bottom:13px;box-shadow:var(--shadow-md)}
.card-title{font-size:13px;letter-spacing:.2px;color:var(--text);font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.kpi.amber::before{background:var(--orange)}.kpi.red::before{background:var(--red)}.kpi.green::before{background:var(--green)}.kpi.purple::before{background:var(--purple)}
.kpi.tap{cursor:pointer;transition:transform .1s,box-shadow .15s}
.kpi.tap:active{transform:scale(.97)}
.kpi.tap::after{content:'›';position:absolute;top:9px;right:12px;color:var(--muted);font-size:17px;font-weight:700;line-height:1}
.kpi-lbl{font-size:11px;color:var(--text-dim);letter-spacing:.2px;font-weight:600}
.kpi-val{font-size:27px;color:var(--text);margin-top:4px;line-height:1.05;font-weight:800;letter-spacing:-.5px}
.kpi-val small{font-size:13px;color:var(--text-dim);font-weight:600;margin-left:3px}
.kpi-sub{font-size:10.5px;color:var(--muted);margin-top:3px}

.job-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--muted);border-radius:14px;padding:14px 16px;margin-bottom:11px;transition:box-shadow .15s,transform .1s;position:relative;box-shadow:var(--shadow-md)}
.job-card:active{transform:scale(.995);box-shadow:var(--shadow-lg)}
.job-card.s-依頼{border-left-color:#94A3B8}
.job-card.s-受注{border-left-color:var(--accent)}
.job-card.s-部品手配{border-left-color:var(--orange)}
.job-card.s-着荷済{border-left-color:var(--purple)}
.job-card.s-作業中{border-left-color:var(--accent)}
.job-card.s-作業完了{border-left-color:var(--green)}
.job-card.s-報告済{border-left-color:var(--green)}
.job-card.s-請求済{border-left-color:#0F766E}
.job-card.s-入金済{border-left-color:var(--green)}
.job-card.s-キャンセル{border-left-color:var(--red)}
.job-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}
.job-no{font-size:11.5px;color:var(--text-dim);letter-spacing:.3px;font-weight:700}
.job-client{font-size:16.5px;color:var(--text);font-weight:800;letter-spacing:.2px;margin-bottom:3px}
.job-meta{font-size:12px;color:var(--text-dim);line-height:1.6}
.job-meta b{color:var(--text);font-weight:700}
.badge{font-size:10.5px;padding:4px 11px;border-radius:999px;font-weight:700;white-space:nowrap;flex-shrink:0}
.st-依頼{background:#EDF1F6;color:#566273}
.st-受注{background:#E4EDFE;color:#1D4ED8}
.st-部品手配{background:#FDF0D5;color:#B45309}
.st-着荷済{background:#EEE7FE;color:#6D28D9}
.st-作業中{background:#DBEAFE;color:#1D4ED8}
.st-作業完了{background:#D8F6E2;color:#15803D}
.st-報告済{background:#CBEFD7;color:#15803D}
.st-請求済{background:#D3F0E6;color:#0F766E}
.st-入金済{background:#16A34A;color:#FFFFFF}
.st-キャンセル{background:#FCE2E3;color:#C0303A}
.job-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.tag{font-size:10.5px;padding:3px 9px;border-radius:7px;background:var(--card2);color:var(--text-dim);border:1px solid var(--border)}
.tag.alert{background:#FDF0D5;color:#B45309;border-color:#F6DCA8}
.tag.ok{background:#DBF5E4;color:#15803D;border-color:#B6E6C6}
.tag.place{background:#EEE7FE;color:#6D28D9;border-color:#D9CDFB}
.tag.danger{background:#FCE2E3;color:#C0303A;border-color:#F4C9CB;font-weight:700}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:11px;font-size:14.5px;font-weight:700;transition:transform .1s,box-shadow .15s,background .15s;min-height:46px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(37,99,235,.25)}
.btn-primary:active{background:var(--accent-deep)}
.btn-secondary{background:#fff;color:var(--text);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.btn-secondary:active{background:var(--card2)}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-danger{background:#FCE9EA;color:var(--red);border:1px solid #F4C9CB}
.btn-success{background:var(--green);color:#fff}
.btn-success:active{background:#12823b}
.btn-full{width:100%}
.btn-sm{padding:8px 13px;min-height:38px;font-size:13px}
.btn-row{display:flex;gap:9px}
.btn-row>.btn{flex:1}

.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--text-dim);font-weight:600;margin-bottom:5px;letter-spacing:.3px}
.field-row{display:flex;gap:9px}
.field-row>.field{flex:1}
.hint{font-size:11px;color:var(--muted);margin-top:4px}
.sec-label{font-size:11px;letter-spacing:1.5px;color:var(--accent);font-weight:700;margin:18px 0 9px;padding-top:13px;border-top:1px solid var(--border);display:flex;align-items:center;gap:7px}
.sec-label:first-child{border-top:none;padding-top:0;margin-top:0}

.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.chip{padding:7px 13px;border-radius:18px;font-size:12.5px;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--text-dim);white-space:nowrap}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip:active{transform:scale(.95)}

.line{display:flex;gap:7px;align-items:flex-start;margin-bottom:8px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px}
.line-main{flex:1;min-width:0}
.line input{padding:8px 10px;font-size:14px;margin-bottom:5px}
.line input:last-child{margin-bottom:0}
.line .del{width:30px;height:30px;border-radius:7px;background:rgba(255,107,107,.12);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;align-self:center}
.add-line{font-size:13px;color:var(--accent);font-weight:700;padding:8px;display:inline-flex;align-items:center;gap:5px}
.chk-row{display:flex;align-items:center;gap:9px;padding:9px 0}
.chk{width:24px;height:24px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;color:transparent;background:var(--bg2)}
.chk.on{background:var(--green);border-color:var(--green);color:#fff}

.money-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin:10px 0}
.money-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--text-dim)}
.money-row b{color:var(--text);font-weight:700}
.money-row.total{border-top:1px solid var(--border);margin-top:6px;padding-top:8px;font-size:15px}
.money-row.profit{color:var(--lime)}.money-row.profit b{color:var(--lime)}

.modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.45);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border-top:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-width:600px;max-height:94vh;display:flex;flex-direction:column;animation:slideUp .26s cubic-bezier(.2,.8,.2,1);box-shadow:0 -12px 44px rgba(16,24,40,.22)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{display:flex;align-items:center;gap:10px;padding:15px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-head h2{font-size:16px;font-weight:700;flex:1;letter-spacing:.3px}
.modal-head .sub{font-size:11px;color:var(--accent);font-weight:600}
.modal-x{width:34px;height:34px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--text-dim);flex-shrink:0}
.modal-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;flex:1}
.modal-foot{padding:12px 16px calc(12px + var(--safe-bottom));border-top:1px solid var(--border);background:var(--card);flex-shrink:0;display:flex;gap:9px}
.modal-foot>.btn{flex:1}

.flow{display:flex;align-items:center;gap:2px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.flow-step{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;min-width:50px}
.flow-dot{width:26px;height:26px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);font-weight:700}
.flow-step.done .flow-dot{background:var(--accent-deep);border-color:var(--accent);color:#fff}
.flow-step.cur .flow-dot{background:var(--accent);border-color:var(--accent-light);color:#fff;box-shadow:0 0 0 4px var(--accent-dim)}
.flow-lbl{font-size:9px;color:var(--text-dim);letter-spacing:.2px}
.flow-step.cur .flow-lbl{color:var(--accent-light);font-weight:700}
.flow-bar{height:1.5px;background:var(--border);flex:1;min-width:6px}
.flow-bar.done{background:var(--accent)}

.dl{display:grid;grid-template-columns:90px 1fr;gap:6px 10px;font-size:13.5px;margin-bottom:4px}
.dl dt{color:var(--text-dim);font-size:12px;padding-top:1px}
.dl dd{color:var(--text);font-weight:500}
.photos{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}
.photo{aspect-ratio:1;border-radius:9px;overflow:hidden;position:relative;background:var(--card2);border:1px solid var(--border)}
.photo img{width:100%;height:100%;object-fit:cover}
.photo .rm{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px}
.photo-add{aspect-ratio:1;border-radius:9px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text-dim);font-size:11px}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ico{font-size:42px;margin-bottom:12px;opacity:.5}
.empty .t{font-size:14px;color:var(--text-dim)}

#toast-host{position:fixed;left:0;right:0;bottom:calc(82px + var(--safe-bottom));z-index:300;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--accent-border);color:var(--text);padding:11px 18px;border-radius:24px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);animation:toastIn .25s;max-width:90vw}
.toast.err{border-color:rgba(255,107,107,.5);color:var(--red)}
.toast.ok{border-color:rgba(74,222,128,.5)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.divider{height:1px;background:var(--border);margin:14px 0}
.list-row{display:flex;align-items:center;gap:11px;padding:13px 4px;border-bottom:1px solid var(--border)}
.list-row:active{background:var(--card2)}
.list-row .ic{width:36px;height:36px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.list-row .tx{flex:1;min-width:0}
.list-row .t1{font-size:14.5px;font-weight:600}
.list-row .t2{font-size:11.5px;color:var(--text-dim);margin-top:2px}
.list-row .arr{color:var(--muted);font-size:18px}
.search{margin-bottom:12px}
.search-wrap{position:relative}
.search-wrap input{padding-left:38px}
.search-wrap .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--muted);pointer-events:none}
.paste-btn{width:100%;padding:12px;border-radius:11px;border:1.5px dashed var(--accent);background:var(--accent-dim);color:var(--accent-deep);font-size:14px;font-weight:700;margin-bottom:6px}
</style>
</head>
<body>
<div id="app">
  <header class="m-header">
    <div class="m-logo">⚡</div>
    <div class="m-title">電装取付管理<small id="hdr-ver">v—</small></div>
    <button class="m-header-btn" id="dbx-sync-btn" onclick="syncNow()" style="display:none" title="今すぐ同期">☁️</button>
    <button class="m-header-btn" onclick="openSettings()">⚙️</button>
  </header>
  <main class="m-main">
    <section class="page active" id="page-home"></section>
    <section class="page" id="page-jobs"></section>
    <section class="page" id="page-billing"></section>
    <section class="page" id="page-master"></section>
  </main>
  <button class="m-fab" id="fab" onclick="openJobModal()">＋ 新規依頼</button>
  <nav class="m-bottomnav">
    <button class="m-tab active" data-tab="home" onclick="switchTab('home')"><span class="icon">🏠</span><span class="label">ホーム</span></button>
    <button class="m-tab" data-tab="jobs" onclick="switchTab('jobs')"><span class="icon">📋</span><span class="label">案件</span></button>
    <button class="m-tab" data-tab="billing" onclick="switchTab('billing')"><span class="icon">💴</span><span class="label">請求</span></button>
    <button class="m-tab" data-tab="master" onclick="switchTab('master')"><span class="icon">🗂️</span><span class="label">マスタ</span></button>
  </nav>
</div>
<div class="modal-bg" id="modal-bg"><div class="modal" id="modal"></div></div>
<div id="toast-host"></div>

<script>
"use strict";
const APP_VERSION = '2026-05-28r';
const LS_KEY = 'denso_mgmt_v1';
const TAX_DEFAULT = 10;
const STATUSES = ['依頼','受注','部品手配','着荷済','作業中','作業完了','報告済','請求済','入金済','キャンセル'];
const FLOW = ['依頼','受注','部品手配','着荷済','作業中','作業完了','報告済','請求済','入金済'];
const FLOW_SHORT = {'依頼':'依頼','受注':'受注','部品手配':'手配','着荷済':'着荷','作業中':'作業','作業完了':'完了','報告済':'報告','請求済':'請求','入金済':'入金'};

/* ───────── データ層 ───────── */
let DATA = null;
function defaultData(){
  return {
    jobs:[],
    clients:[{id:'cl-proceed',name:'株式会社プロシード',contacts:[],tel:'',address:'',closingDay:'末',memo:'末締め・翌月末払い'}],
    subcontractors:[{id:'sub-moromizato',name:'諸見里 貢',tel:'',memo:''}],
    presets:[
      {id:uid(),name:'ドラレコ前後取付',price:''},
      {id:uid(),name:'ナビ取付',price:''},
      {id:uid(),name:'マット設置',price:''},
      {id:uid(),name:'CDオーディオ取付',price:''},
    ],
    settings:{

function load(){
  try{ const raw=localStorage.getItem(LS_KEY); DATA = raw? JSON.parse(raw): defaultData(); }
  catch(e){ DATA = defaultData(); }
  _migrate(DATA);
}
function _migrate(D){
  const d=defaultData();
  for(const k of Object.keys(d)){ if(D[k]===undefined) D[k]=d[k]; }
  for(const k of Object.keys(d.settings)){ if(D.settings[k]===undefined) D.settings[k]=d.settings[k]; }
  (D.jobs||[]).forEach(j=>{
    if(j.unitFee===undefined && Array.isArray(j.workItems)){
      j.workDesc=(j.workItems||[]).map(w=>w.name).join('＋');
      j.qty=1; j.unitFee=(j.workItems||[]).reduce((s,w)=>s+(Number(w.qty||1)*Number(w.price||0)),0);
    }
    if(j.qty===undefined) j.qty=1;
    if(j.unitFee===undefined) j.unitFee='';
    if(j.workDesc===undefined) j.workDesc='';
    ['endUser','workPlace','siteContact','siteTel','partsEta','workableFrom','deadline','billingDesc','scheduledEndAt','workEndAt'].forEach(f=>{ if(j[f]===undefined) j[f]=''; });
    if(j.etc===undefined) j.etc={used:false,count:'',unit:''};
    if(j.partsDest===undefined) j.partsDest='当社';
  });
  return D;
}

  try{ localStorage.setItem(LS_KEY, JSON.stringify(DATA)); }

  _scheduleSync();
}

/* ───────── ユーティリティ ───────── */
function uid(){ return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function yen(n){ n=Math.round(Number(n)||0); return '¥'+n.toLocaleString('ja-JP'); }
function pad2(n){ return String(n).padStart(2,'0'); }
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function curMonth(){ const d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1); }
function parseISO(s){ if(!s) return null; const p=String(s).slice(0,10).split('-'); if(p.length<3) return null; const d=new Date(+p[0],+p[1]-1,+p[2]); return isNaN(d)?null:d; }
function fmtD(s){ const d=parseISO(s); if(!d) return '—'; const w=['日','月','火','水','木','金','土'][d.getDay()]; return (d.getMonth()+1)+'/'+d.getDate()+'('+w+')'; }
function fmtMonth(m){ if(!m) return '—'; const p=m.split('-'); return p[0]+'年'+(+p[1])+'月'; }
function fmtFullDate(s){ const d=parseISO(s); if(!d) return ''; return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'; }
function endOfMonth(m){ const p=m.split('-'); const e=new Date(+p[0],+p[1],0); return e.getFullYear()+'-'+pad2(e.getMonth()+1)+'-'+pad2(e.getDate()); }
function endOfNextMonth(m){ const p=m.split('-'); const e=new Date(+p[0],+p[1]+1,0); return e.getFullYear()+'-'+pad2(e.getMonth()+1)+'-'+pad2(e.getDate()); }
function num(v){ const n=Number(String(v==null?'':v).replace(/[,¥\s]/g,'')); return isNaN(n)?0:n; }
function nextSeq(month){ DATA.seq[month]=(DATA.seq[month]||0)+1; return DATA.seq[month]; }
function genJobNo(){ const m=curMonth(); const n=nextSeq(m); return m+'-'+String(n).padStart(4,'0'); }
function clientById(id){ return DATA.clients.find(c=>c.id===id); }

/* 金額: 明細金額(税抜)= 数量 × 工賃単価(税別) */
function jobSubtotal(j){ return num(j.qty||1)*num(j.unitFee); }
function jobPartsCost(j){ return (j.parts||[]).reduce((s,p)=> s + num(p.cost),0); }
function jobOutsource(j){ return (j.outsource && j.outsource.used)? num(j.outsource.cost):0; }
function jobEtcCost(j){ return (j.etc && j.etc.used)? num(j.etc.count)*num(j.etc.unit||DATA.settings.etcSetupFee||0):0; }
function jobProfit(j){ return jobSubtotal(j) - jobPartsCost(j) - jobOutsource(j) - jobEtcCost(j); }
function taxRate(){ return num(DATA.settings.taxRate)||0; }
function withTax(n){ return Math.round(n*(1+taxRate()/100)); }
function billingDescOf(j){
  if(j.billingDesc && j.billingDesc.trim()) return j.billingDesc.trim();
  const p=[]; if(j.carModel) p.push(j.carModel); if(j.endUser) p.push(j.endUser+'様'); if(j.workDesc) p.push(j.workDesc);
  return p.join('　').trim() || (j.workDesc||'');
}
function workScheduleStr(j){ const s=j.scheduledAt,e=j.scheduledEndAt; if(s&&e&&e!==s) return fmtD(s)+' 〜 '+fmtD(e); if(s) return fmtD(s); return '未定'; }
function workDoneStr(j){ const s=j.workedAt,e=j.workEndAt; if(s&&e&&e!==s) return fmtD(s)+' 〜 '+fmtD(e); if(s) return fmtD(s); return ''; }
function isWorkDone(j){ return ['作業完了','報告済','請求済','入金済','キャンセル'].includes(j.status); }
function deadlineState(j){ if(!j.deadline||isWorkDone(j)) return ''; const d=parseISO(j.deadline); if(!d) return ''; const days=Math.round((d-parseISO(todayISO()))/86400000); if(days<0) return 'over'; if(days<=3) return 'soon'; return ''; }

/* ───────── トースト/確認 ───────── */
function toast(msg,type){
  const h=document.getElementById('toast-host');
  const el=document.createElement('div');
  el.className='toast'+(type==='err'?' err':type==='ok'?' ok':'');
  el.textContent=msg; h.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2300);
  try{ if(navigator.vibrate) navigator.vibrate(type==='err'?[30,40,30]:12); }catch(e){}
}
function confirmModal(msg,{danger=false,okText='OK',cancelText='キャンセル'}={}){
  return new Promise(res=>{
    const bg=document.getElementById('modal-bg'), m=document.getElementById('modal');
    m.innerHTML=`<div class="modal-body" style="padding:22px 18px"><div style="font-size:15px;line-height:1.6;white-space:pre-wrap">${esc(msg)}</div></div>
      <div class="modal-foot"><button class="btn btn-ghost" id="cm-no">${esc(cancelText)}</button><button class="btn ${danger?'btn-danger':'btn-primary'}" id="cm-yes">${esc(okText)}</button></div>`;
    bg.classList.add('open');
    m.querySelector('#cm-no').onclick=()=>{ closeModal(); res(false); };
    m.querySelector('#cm-yes').onclick=()=>{ closeModal(); res(true); };

}

  if(jobFilter==='active') jobs=jobs.filter(j=>!['請求済','入金済','キャンセル'].includes(j.status));
  else if(jobFilter==='inquiry') jobs=jobs.filter(j=>['依頼','受注'].includes(j.status));
  else if(jobFilter==='awaiting') jobs=jobs.filter(j=>j.status!=='キャンセル'&&_isAwaitingParts(j));
  else if(jobFilter==='all'){} else jobs=jobs.filter(j=>j.status===jobFilter);
  if(jobSearch){ const q=jobSearch.toLowerCase(); jobs=jobs.filter(j=>{ const cl=clientById(j.clientId); return [j.jobNo,cl?cl.name:j.clientName,j.carModel,j.carPlate,j.endUser,j.workPlace,j.siteContact,j.workDesc,j.memo].join(' ').toLowerCase().includes(q); }); }

}

function jobCard(j){
  const cl=clientById(j.clientId);

  if(j.deadline && !isWorkDone(j)) tags.push(`<span class="tag ${ds==='over'?'danger':ds==='soon'?'alert':''}">${ds==='over'?'⚠️期日超過 ':ds==='soon'?'⏰期日 ':'期日 '}${fmtD(j.deadline)}</span>`);

  const partsAll=(j.parts||[]).length, partsIn=(j.parts||[]).filter(p=>p.arrived).length;
  if(partsAll) tags.push(partsIn<partsAll? `<span class="tag alert">部品 ${partsIn}/${partsAll}着荷</span>` : `<span class="tag ok">部品 全着荷</span>`);
  else if(j.partsEta && ['受注','部品手配'].includes(j.status)) tags.push(`<span class="tag alert">${esc(j.partsEta)}</span>`);
  if(j.outsource&&j.outsource.used) tags.push(`<span class="tag">🤝${esc(j.outsource.vendor||'外注')}${j.outsource.vendor?' 様':''}</span>`);
  if(j.scheduledAt) tags.push(`<span class="tag">作業 ${fmtD(j.scheduledAt)}</span>`);
  const idx=FLOW.indexOf(j.status);
  const next=(idx>=0&&idx<FLOW.length-1&&j.status!=='報告済');
  const qtyStr=num(j.qty)>1?` ×${num(j.qty)}台`:'';
  return `<div class="job-card s-${j.status}" onclick="openJobDetail('${j.id}')">
    <div class="job-row1"><span class="job-no">${esc(j.jobNo||'')}</span><span class="badge st-${j.status}">${j.status}</span></div>
    <div class="job-client">${esc(cl?cl.name:j.clientName||'(取引先未設定)')}</div>
    <div class="job-meta"><b>${esc(j.carModel||'車種未設定')}</b>${j.endUser?' ／ '+esc(j.endUser)+'様':''} ${esc(j.carPlate||'')}<br>${esc(j.workDesc||'内容未設定')}${num(j.qty)>1?' ・ '+num(j.qty)+'台':''}${isAdmin()?' ・ <b>'+yen(jobSubtotal(j))+'</b><span style="font-size:10px;color:var(--muted)"> 税抜</span>':''}</div>
    <div class="job-tags">${tags.join('')}</div>
    ${next?`<div style="margin-top:10px" onclick="event.stopPropagation()"><button class="btn btn-primary btn-sm btn-full" onclick="advanceStatus('${j.id}')">${nextActionLabel(j.status)} →</button></div>`:''}
  </div>`;
}
function nextActionLabel(s){
  return {'依頼':'受注にする','受注':'部品手配する','部品手配':'着荷を記録','着荷済':'作業開始','作業中':'作業完了','作業完了':'報告完了'}[s]||'次へ';
}
async function advanceStatus(id){
  const j=DATA.jobs.find(x=>x.id===id); if(!j) return;
  const idx=FLOW.indexOf(j.status); if(idx<0||idx>=FLOW.length-1) return;
  if(j.status==='部品手配'){ openPartsCheck(id); return; }
  if(j.status==='着荷済'){ j.status='作業中'; if(!j.workedAt) j.workedAt=todayISO(); }
  else if(j.status==='作業中'){ openReportModal(id); return; }
  else j.status=FLOW[idx+1];
  stamp(j); save(); toast(j.status+'に更新','ok'); refresh();
}

/* 依頼文 貼り付け取込 */
async function pasteRequest(){
  let text='';
  try{ if(navigator.clipboard&&navigator.clipboard.readText) text=await navigator.clipboard.readText(); }catch(e){}
  if(!text){ text=await promptModal('依頼文を貼り付けてください'); }
  if(!text) return;
  const r=parseRequestText(text);
  const setv=(id,v)=>{ const el=document.getElementById(id); if(el&&v) el.value=v; };
  setv('f-workdesc',r.workDesc); setv('f-carmodel',r.carModel); setv('f-enduser',r.endUser); setv('f-workplace',r.workPlace);
  setv('f-sitecontact',r.siteContact); setv('f-sitetel',r.siteTel); setv('f-partseta',r.partsEta);
  setv('f-workablefrom',r.workableFrom); setv('f-unitfee',r.unitFee);
  if(r.memo){ const mm=document.getElementById('f-memo'); mm.value=(mm.value?mm.value+'\n':'')+r.memo; }
  recalcMoney(); syncBillingHint();
  toast('依頼文を取り込みました。内容を確認してください','ok');
}
function parseRequestText(text){
  const lines=String(text).split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  const r={workDesc:'',carModel:'',endUser:'',workPlace:'',siteContact:'',siteTel:'',unitFee:'',partsEta:'',workableFrom:'',memo:''};
  const memoLines=[]; const phoneRe=/0\d{1,3}[-\s]?\d{2,4}[-\s]?\d{3,4}/;
  let lastKey='';
  lines.forEach(raw=>{
    const l=raw.replace(/^[※・\-\s]+/,'').trim();
    if(/^(車両|車種)[\s:：]/.test(l) && !r.carModel && l.length<40){
      let v=l.replace(/^(車両|車種)[:：\s]*/,'').trim();
      const mm=v.match(/[（(]([^（）()]*?)様[^（）()]*[）)]/); if(mm) r.endUser=mm[1].trim();
      v=v.replace(/[（(][^（）()]*[）)]/g,'').trim();
      r.carModel=v; lastKey='car'; return;
    }
    if(/^(作業場所|場所)[\s:：]/.test(l)){ r.workPlace=l.replace(/^(作業場所|場所)[:：\s]*/,'').trim(); lastKey='place'; return; }
    if(/^担当者?[\s:：]/.test(l)){ const mt=l.match(phoneRe); if(mt) r.siteTel=mt[0].replace(/\s/g,''); r.siteContact=l.replace(/^担当者?[:：\s]*/,'').replace(phoneRe,'').trim(); lastKey='contact'; return; }
    if(/工賃|作業料金/.test(l)){ const mt=l.match(/[\d,]{3,}/); if(mt) r.unitFee=mt[0].replace(/,/g,''); lastKey='fee'; return; }
    if(/着荷/.test(l) && l.length<30){
      const dm=l.match(/(\d+\/\d+|\d+月\d*日?|\d+日)\s*着荷/); r.partsEta = dm? dm[1]+'着荷予定' : l;
      const pm=l.match(/[（(]([^（）()]+)[）)]/); if(pm){ if(r.workDesc) r.workDesc+='（'+pm[1]+'）'; else memoLines.push('部品: '+pm[1]); }
      lastKey='eta'; return;
    }
    if(/取付|ナビ|カメラ|ドラレコ|ETC|配線|電装|コーティング|マット|オーディオ/.test(l) && !r.workDesc && l.length<70){ r.workDesc=l; lastKey='desc'; return; }
    if(lastKey==='place' && (/^[（(]/.test(l) || /[都道府県市区町村]|番地|丁目|字|\d+番/.test(l)) && l.length<44){ r.workPlace+=' '+l.replace(/^[（(]|[）)]$/g,''); return; }
    lastKey=''; memoLines.push(raw);
  });
  if(!r.workableFrom){ const mt=String(text).match(/(\d+月\d+日?|\d+\/\d+)以降/); if(mt) r.workableFrom=mt[0]; }
  r.memo=memoLines.join('\n');
  return r;
}

function openPartsCheck(id){

  const bg=document.getElementById('modal-bg'), m=document.getElementById('modal');
  m.innerHTML=`<div class="modal-head"><h2>📦 部品着荷チェック</h2><span class="sub">${esc(j.jobNo)}</span><button class="modal-x" onclick="closeModal()">✕</button></div>
  <div class="modal-body" id="pc-body"></div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="openJobDetail('${id}')">戻る</button><button class="btn btn-success" id="pc-done" onclick="finishPartsCheck('${id}')">全着荷 → 作業準備OK</button></div>`;

function renderPartsCheckBody(id){

    (j.parts||[]).map((p,i)=>`<div class="line" style="cursor:pointer" onclick="togglePartArrival('${id}',${i})"><div class="chk ${p.arrived?'on':''}" style="margin-right:4px">✓</div><div class="line-main"><div style="font-size:15px;font-weight:600">${esc(p.name)}</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">${esc(p.supplier||'')} ${p.arrived&&p.arrivedAt?'・着荷'+fmtD(p.arrivedAt):''}</div></div></div>`).join('');

function togglePartArrival(id,i){ const j=DATA.jobs.find(x=>x.id===id); j.parts[i].arrived=!j.parts[i].arrived; j.parts[i].arrivedAt=j.parts[i].arrived?todayISO():''; save(); renderPartsCheckBody(id); }
function finishPartsCheck(id){

async function onPhotoPick(id,input){
  const j=DATA.jobs.find(x=>x.id===id); const files=Array.from(input.files||[]);
  for(const f of files){
    if((j.photos||[]).length>=12){ toast('写真は12枚までです','err'); break; }
    try{ const d=await compressImage(f,1280,0.6); (j.photos=j.photos||[]).push(d); }catch(e){ toast('画像の処理に失敗','err'); }
  }
  input.value=''; save(); renderReportPhotos(id);
}
function compressImage(file,maxDim,quality){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ URL.revokeObjectURL(url);
      let w=img.width,h=img.height; if(w>h){ if(w>maxDim){h=h*maxDim/w;w=maxDim;} } else { if(h>maxDim){w=w*maxDim/h;h=maxDim;} }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',quality)); };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('img load')); };
    img.src=url;
  });
}
async function removePhoto(id,i){ const j=DATA.jobs.find(x=>x.id===id); j.photos.splice(i,1); save(); renderReportPhotos(id); }

/* ───────── 月次請求 ───────── */
let billMonth=curMonth(); let billMode='sales';
function billMonthOf(j){ return j.billingMonth || ((['作業完了','報告済'].includes(j.status))?(j.workedAt||'').slice(0,7):''); }
function billingMonths(){ const a=[]; const now=new Date(); for(let i=0;i<12;i++){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); a.push(d.getFullYear()+'-'+pad2(d.getMonth()+1)); } return a; }
function renderBilling(){
  const months=billingMonths();
  const head=`<div class="page-h">💴 月次請求・清算</div>
  <div class="field"><label>対象月(末締め)</label><select onchange="billMonth=this.value;renderBilling()">${months.map(mm=>`<option value="${mm}" ${mm===billMonth?'selected':''}>${fmtMonth(mm)}</option>`).join('')}</select></div>
  <div class="chips"><button class="chip ${billMode==='sales'?'active':''}" onclick="billMode='sales';renderBilling()">📤 売上請求</button><button class="chip ${billMode==='outsource'?'active':''}" onclick="billMode='outsource';renderBilling()">🤝 外注費清算</button></div>`;
  document.getElementById('page-billing').innerHTML=head + (billMode==='sales'? renderSalesBilling() : renderOutsourceSettle());
}
function renderSalesBilling(){
  const target=DATA.jobs.filter(j=> j.status!=='キャンセル' && billMonthOf(j)===billMonth && ['作業完了','報告済','請求済','入金済'].includes(j.status));
  const groups={}; target.forEach(j=>{ const k=j.clientId||('_'+j.clientName); (groups[k]=groups[k]||[]).push(j); });
  const groupArr=Object.keys(groups).map(k=>({key:k,jobs:groups[k],client:clientById(groups[k][0].clientId)}));
  const totalBill=target.reduce((s,j)=>s+jobSubtotal(j),0);
  const totalBillTax=target.reduce((s,j)=>s+withTax(jobSubtotal(j)),0);
  const totalProfit=target.reduce((s,j)=>s+jobProfit(j),0);
  return `<div class="kpi-grid">
    <div class="kpi"><div class="kpi-lbl">請求合計(税抜)</div><div class="kpi-val" style="font-size:21px">${yen(totalBill)}</div><div class="kpi-sub">税込 ${yen(totalBillTax)} ・ ${target.length}件/${groupArr.length}社</div></div>
    <div class="kpi green"><div class="kpi-lbl">粗利合計</div><div class="kpi-val" style="font-size:21px">${yen(totalProfit)}</div></div>
  </div>
  ${groupArr.length? groupArr.map(billingGroupCard).join('') : '<div class="empty"><div class="ico">🗓</div><div class="t">この月の請求対象案件はありません</div><div style="font-size:11px;color:var(--muted);margin-top:6px">案件を「作業完了」にすると請求対象になります</div></div>'}`;
}
function renderOutsourceSettle(){
  const jobs=DATA.jobs.filter(j=> j.status!=='キャンセル' && j.outsource&&j.outsource.used && num(j.outsource.cost)>0 && (j.workedAt||'').slice(0,7)===billMonth);
  const groups={}; jobs.forEach(j=>{ const v=j.outsource.vendor||'(未設定)'; (groups[v]=groups[v]||[]).push(j); });
  const vendors=Object.keys(groups);
  const total=jobs.reduce((s,j)=>s+num(j.outsource.cost),0);
  const unpaid=jobs.filter(j=>!j.outsource.paid).reduce((s,j)=>s+num(j.outsource.cost),0);

    <div class="kpi purple"><div class="kpi-lbl">外注費 合計</div><div class="kpi-val" style="font-size:21px">${yen(total)}</div><div class="kpi-sub">${jobs.length}件 / ${vendors.length}社</div></div>
    <div class="kpi red"><div class="kpi-lbl">未清算</div><div class="kpi-val" style="font-size:21px">${yen(unpaid)}</div></div>
  </div>
  <div class="hint" style="margin:-4px 2px 12px">作業実施月(${fmtMonth(billMonth)})の外注費。元請け金額は含みません</div>

function outsourceVendorCard(vendor,jobs){
  const total=jobs.reduce((s,j)=>s+num(j.outsource.cost),0);
  const allPaid=jobs.every(j=>j.outsource.paid);
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:15px;font-weight:700">🤝 ${esc(vendor)}${vendor&&vendor!=='(未設定)'?' 様':''}</div>
      <span class="badge ${allPaid?'st-入金済':'st-部品手配'}">${allPaid?'清算済':'未清算'}</span>
    </div>
    ${jobs.map(j=>`<div style="display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--border)" onclick="openJobDetail('${j.id}')">
      <span>${fmtD(j.workedAt)} ${esc(j.carModel||'')}${num(j.qty)>1?' ×'+num(j.qty)+'台':''} <span style="color:var(--muted)">${esc(j.workDesc||'')}</span></span>
      <span style="white-space:nowrap">${j.outsource.paid?'<span style="color:var(--green)">済 </span>':''}${yen(j.outsource.cost)}</span></div>`).join('')}
    <div class="money-box" style="margin:10px 0 8px"><div class="money-row total"><span>支払合計</span><b>${yen(total)}</b></div></div>
    ${allPaid?'':`<button class="btn btn-success btn-sm btn-full" onclick="settleOutsource(this.dataset.v,'${billMonth}')" data-v="${esc(vendor)}">この外注先を清算済にする</button>`}
  </div>`;
}
async function settleOutsource(vendor,month){
  if(!await confirmModal(vendor+' の '+fmtMonth(month)+'分 外注費を清算済(支払済)にしますか？',{okText:'清算済にする'})) return;
  DATA.jobs.forEach(j=>{ if(j.outsource&&j.outsource.used&&(j.outsource.vendor||'(未設定)')===vendor&&(j.workedAt||'').slice(0,7)===month){ j.outsource.paid=true; stamp(j); } });
  save(); toast('清算済にしました','ok'); renderBilling();
}
function billingGroupCard(g){
  const name=g.client?g.client.name:(g.jobs[0].clientName||'(取引先未設定)');

function groupJobs(key,month){
  return DATA.jobs.filter(j=> j.status!=='キャンセル' && (j.clientId||('_'+j.clientName))===key && billMonthOf(j)===month && ['作業完了','報告済','請求済','入金済'].includes(j.status));
}
function generateInvoice(key,month,markInvoiced){
  const jobs=groupJobs(key,month); if(!jobs.length){ toast('対象がありません','err'); return; }
  const client=clientById(jobs[0].clientId);
  const st=DATA.settings;
  if(markInvoiced && !st.company){ toast('先に⚙️設定で自社情報を入力してください','err'); openSettings(); return; }
  let invNo;
  if(markInvoiced){
    const n=num(st.nextInvoiceNo)||1; invNo='INV-'+String(n).padStart(10,'0'); st.nextInvoiceNo=n+1; st._updatedAt=Date.now();
    const issueDate=endOfMonth(month);
    jobs.forEach(j=>{ if(j.status!=='入金済') j.status='請求済'; j.invoiceNo=invNo; j.invoicedAt=issueDate; if(!j.billingMonth) j.billingMonth=month; stamp(j); });
    save();
  } else { invNo=jobs[0].invoiceNo || '(プレビュー)'; }
  openInvoiceWindow(client,jobs,month,invNo);
  if(markInvoiced){ closeModal(); toast('請求書 '+invNo+' を発行しました','ok'); renderBilling(); }
}

/* 作業報告書を画像に合成してLINE等へ共有 */
function _loadImg(src){ return new Promise(res=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=()=>res(null); im.src=src; }); }
function _wrapText(ctx,text,maxW){ const lines=[]; let line=''; const s=String(text==null?'':text); for(const ch of s){ if(ch==='\n'){ lines.push(line); line=''; continue; } const t=line+ch; if(ctx.measureText(t).width>maxW && line){ lines.push(line); line=ch; } else line=t; } if(line) lines.push(line); return lines.length?lines:['']; }
function _drawCover(ctx,im,x,y,w,h){ const ir=im.width/im.height, r=w/h; let sw,sh,sx,sy; if(ir>r){ sh=im.height; sw=sh*r; sx=(im.width-sw)/2; sy=0; } else { sw=im.width; sh=sw/r; sx=0; sy=(im.height-sh)/2; } ctx.drawImage(im,sx,sy,sw,sh,x,y,w,h); }
async function composeReportImage(j){
  const cl=clientById(j.clientId), st=DATA.settings;
  const photos=(await Promise.all((j.photos||[]).map(_loadImg))).filter(Boolean);
  const W=860, pad=40, gap=14, big=document.createElement('canvas'); big.width=W; big.height=8000;
  const ctx=big.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,8000); ctx.textBaseline='top';
  let y=pad;
  ctx.fillStyle='#16202E'; ctx.font='bold 34px sans-serif'; ctx.fillText('作業報告書',pad,y);
  ctx.font='13px sans-serif'; ctx.fillStyle='#555'; ctx.textAlign='right';
  ctx.fillText('No. '+(j.jobNo||''),W-pad,y+4); ctx.fillText('報告日 '+fmtFullDate(todayISO()),W-pad,y+24); ctx.textAlign='left';
  y+=54; ctx.font='13px sans-serif'; ctx.fillStyle='#555'; ctx.fillText((st.company||'')+(st.tel?'　TEL '+st.tel:''),pad,y); y+=26;
  ctx.strokeStyle='#16202E'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(W-pad,y); ctx.stroke(); y+=18;
  function row(label,val){ ctx.font='bold 14px sans-serif'; ctx.fillStyle='#666'; ctx.fillText(label,pad,y); ctx.font='15px sans-serif'; ctx.fillStyle='#16202E'; const ls=_wrapText(ctx,val,W-pad-140); ls.forEach((ln,i)=>ctx.fillText(ln,pad+120,y+i*22)); y+=Math.max(22,ls.length*22)+9; }
  row('取引先',(cl?cl.name:j.clientName||'')+' 御中');
  row('エンド/車両',(j.endUser?j.endUser+'様 ':'')+(j.carModel||'')+(num(j.qty)>1?' ×'+num(j.qty)+'台':'')+(j.carPlate?' '+j.carPlate:''));
  row('作業日',workDoneStr(j)||workScheduleStr(j));
  row('担当',(j.worker||DATA.settings.company||''));
  row('作業内容',j.workDesc||'');
  y+=4; ctx.font='bold 15px sans-serif'; ctx.fillStyle='#1D4ED8'; ctx.fillText('作業報告',pad,y); y+=24;
  ctx.font='15px sans-serif'; ctx.fillStyle='#16202E'; _wrapText(ctx,j.reportNote||'（記入なし）',W-pad*2).forEach(ln=>{ ctx.fillText(ln,pad,y); y+=23; }); y+=12;
  if(photos.length){
    ctx.font='bold 15px sans-serif'; ctx.fillStyle='#1D4ED8'; ctx.fillText('作業写真',pad,y); y+=26;
    const cols=2, cw=(W-pad*2-gap)/cols, ch=cw*0.72;
    for(let i=0;i<photos.length;i++){ const col=i%cols, x=pad+col*(cw+gap); _drawCover(ctx,photos[i],x,y,cw,ch); ctx.strokeStyle='#ddd'; ctx.lineWidth=1; ctx.strokeRect(x,y,cw,ch); if(col===cols-1||i===photos.length-1) y+=ch+gap; }
  }
  y+=pad-gap;
  const out=document.createElement('canvas'); out.width=W; out.height=Math.ceil(y); out.getContext('2d').drawImage(big,0,0);
  return await new Promise(res=>out.toBlob(b=>res(b),'image/jpeg',0.85));
}

  let y=pad;
  ctx.fillStyle='#16202E'; ctx.font='bold 34px sans-serif'; ctx.fillText('作業指示書',pad,y);
  ctx.font='13px sans-serif'; ctx.fillStyle='#555'; ctx.textAlign='right';
  ctx.fillText('No. '+(j.jobNo||''),W-pad,y+4); ctx.fillText('発行 '+fmtFullDate(todayISO()),W-pad,y+24); ctx.textAlign='left';
  y+=54; ctx.fillText((st.company||'')+(st.tel?'　TEL '+st.tel:''),pad,y); y+=26;
  ctx.strokeStyle='#16202E'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(W-pad,y); ctx.stroke(); y+=18;
  function row(label,val,bold){ ctx.font='bold 14px sans-serif'; ctx.fillStyle='#666'; ctx.fillText(label,pad,y); ctx.font=(bold?'bold ':'')+'15px sans-serif'; ctx.fillStyle='#16202E'; const ls=_wrapText(ctx,val,W-pad-140); ls.forEach((ln,i)=>ctx.fillText(ln,pad+120,y+i*22)); y+=Math.max(22,ls.length*22)+9; }
  row('取引先',(cl?cl.name:j.clientName||''));
  row('エンド/車両',(j.endUser?j.endUser+'様 ':'')+(j.carModel||'')+(num(j.qty)>1?' ×'+num(j.qty)+'台':'')+(j.carPlate?' '+j.carPlate:''),true);
  row('作業場所',j.workPlace||'—');
  row('現場担当',(j.siteContact||'—')+(j.siteTel?'　'+j.siteTel:''));
  row('日程','着荷予定 '+(j.partsEta||'—')+' ／ 作業可能 '+(j.workableFrom||'—')+' ／ 期日 '+(j.deadline?fmtD(j.deadline):'—'));

  row('担当','自社 '+(j.worker||'—')+(j.outsource&&j.outsource.used?'　外注 '+(j.outsource.vendor||'')+(j.outsource.vendor?' 様':''):''));
  y+=4; ctx.font='bold 15px sans-serif'; ctx.fillStyle='#1D4ED8'; ctx.fillText('作業内容',pad,y); y+=24;
  ctx.font='bold 17px sans-serif'; ctx.fillStyle='#16202E'; _wrapText(ctx,j.workDesc||'',W-pad*2).forEach(ln=>{ ctx.fillText(ln,pad,y); y+=25; }); y+=8;
  if((j.parts||[]).length){ ctx.font='bold 15px sans-serif'; ctx.fillStyle='#1D4ED8'; ctx.fillText('部品'+(num(j.qty)>1?'（各'+num(j.qty)+'台分）':'')+'　届け先: '+(j.partsDest||'当社'),pad,y); y+=24; ctx.font='14px sans-serif'; ctx.fillStyle='#16202E'; (j.parts||[]).forEach(p=>{ ctx.fillText('・'+p.name+(p.arrived?'（着荷済）':'（未着）'),pad,y); y+=21; }); y+=6; }
  if(j.outsource&&j.outsource.used&&num(j.outsource.cost)){ ctx.font='bold 15px sans-serif'; ctx.fillStyle='#1D4ED8'; ctx.fillText('外注費(税抜)',pad,y); y+=24; ctx.font='16px sans-serif'; ctx.fillStyle='#16202E'; ctx.fillText(yen(j.outsource.cost),pad,y); y+=26; }
  ctx.font='bold 15px sans-serif'; ctx.fillStyle='#1D4ED8'; ctx.fillText('備考・注意事項',pad,y); y+=24;
  ctx.font='15px sans-serif'; ctx.fillStyle='#16202E'; _wrapText(ctx,j.memo||'（なし）',W-pad*2).forEach(ln=>{ ctx.fillText(ln,pad,y); y+=23; });
  y+=pad;
  const out=document.createElement('canvas'); out.width=W; out.height=Math.ceil(y); out.getContext('2d').drawImage(big,0,0);
  return await new Promise(res=>out.toBlob(b=>res(b),'image/jpeg',0.9));
}

const DBX_APP_KEY='fly154tcdbz09x9';

const DBX_LS={token:'denso_dbx_token',refresh:'denso_dbx_refresh',verifier:'denso_dbx_verifier',cachedRev:'denso_dbx_rev',cachedSnap:'denso_dbx_snap'};

function _asciiSafeJson(obj){ return JSON.stringify(obj).replace(/[\x7F-￿]/g, c=>'\\u'+('0000'+c.charCodeAt(0).toString(16)).slice(-4)); }
function _genVerifier(){ const a=new Uint8Array(48); crypto.getRandomValues(a); return btoa(String.fromCharCode.apply(null,a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
async function _sha256b64u(s){ const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)); return btoa(String.fromCharCode.apply(null,new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function getRedirectUri(){ return location.origin+location.pathname; }
async function dbxAuthorize(){
  try{ const v=_genVerifier(); const ch=await _sha256b64u(v); sessionStorage.setItem(DBX_LS.verifier,v);
    const p=new URLSearchParams({client_id:DBX_APP_KEY,response_type:'code',code_challenge:ch,code_challenge_method:'S256',redirect_uri:getRedirectUri(),token_access_type:'offline'});
    location.href='https://www.dropbox.com/oauth2/authorize?'+p;
  }catch(e){ toast('認証開始に失敗: '+e.message,'err'); }
}
async function dbxHandleCallback(){

  const v=sessionStorage.getItem(DBX_LS.verifier); if(!v){ toast('認証エラー(verifier紛失)','err'); return false; }
  toast('Dropbox認証中…');

    const res=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:p.toString()});
    if(!res.ok) throw new Error('Token交換失敗 '+res.status);
    const d=await res.json(); DBX_TOKEN=d.access_token; DBX_REFRESH=d.refresh_token||null;
    localStorage.setItem(DBX_LS.token,DBX_TOKEN); if(DBX_REFRESH) localStorage.setItem(DBX_LS.refresh,DBX_REFRESH);
    sessionStorage.removeItem(DBX_LS.verifier); history.replaceState({},'',getRedirectUri());
    toast('✅ Dropbox連携完了','ok'); return true;
  }catch(e){ toast('認証エラー: '+e.message,'err'); return false; }
}
async function dbxRefreshToken(){

    const res=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:p.toString()});
    if(!res.ok) return false; const d=await res.json(); DBX_TOKEN=d.access_token; localStorage.setItem(DBX_LS.token,DBX_TOKEN); _lastTokenRefresh=Date.now(); return true;

function _startProactiveRefresh(){ if(!localStorage.getItem(DBX_LS.refresh)) return;

async function dbxLogout(){ if(!await confirmModal('Dropbox連携を解除しますか？\n(この端末のローカルデータは残ります)',{danger:true,okText:'解除する'})) return;
  DBX_TOKEN=null; DBX_REFRESH=null; ['token','refresh','cachedRev','cachedSnap'].forEach(k=>localStorage.removeItem(DBX_LS[k])); toast('連携を解除しました','ok'); setTimeout(()=>location.reload(),700); }
async function dbxApi(endpoint,args,body,contentType){ if(!DBX_TOKEN) throw new Error('未認証');
  const doReq=async()=>{ const h={'Authorization':'Bearer '+DBX_TOKEN}; if(args!==null&&args!==undefined) h['Dropbox-API-Arg']=_asciiSafeJson(args); if(contentType) h['Content-Type']=contentType; return await fetch(endpoint,{method:'POST',headers:h,body}); };
  let res=await doReq(); if(res.status===401){ if(await dbxRefreshToken()) res=await doReq(); } return res;
}
async function dbxLoadData(){ const res=await dbxApi('https://content.dropboxapi.com/2/files/download',{path:DBX_DATA_PATH},null,null);
  if(res.status===409){ let detail=''; try{ detail=await res.text(); }catch(e){} return {data:null,rev:null,errorDetail:detail}; }
  if(!res.ok) throw new Error('Dropbox読込失敗 '+res.status);

async function dbxSaveDataAtomic(jsonStr,expectedRev){ const args={path:DBX_DATA_PATH,mode:expectedRev?{'.tag':'update',update:expectedRev}:{'.tag':'overwrite'},autorename:false,mute:true};
  const res=await dbxApi('https://content.dropboxapi.com/2/files/upload',args,new Blob([jsonStr],{type:'application/octet-stream'}),'application/octet-stream');
  if(!res.ok){ const err=await res.text(); if(res.status===409){ const e=new Error('rev_conflict'); e.code='rev_conflict'; throw e; } throw new Error('Dropbox書込失敗 '+res.status+' '+err); }

function captureSyncSnapshot(data){ if(!data){ _lastSyncSnapshot=null; return; } const snap={}; _SYNC_COLS.forEach(key=>{ snap[key]={}; (data[key]||[]).forEach(it=>{ if(it&&it.id) snap[key][it.id]=JSON.stringify(it); }); }); _lastSyncSnapshot=snap; try{ localStorage.setItem(DBX_LS.cachedSnap,JSON.stringify(snap)); }catch(e){} }
function restoreSyncSnapshot(){ try{ const raw=localStorage.getItem(DBX_LS.cachedSnap); if(raw) _lastSyncSnapshot=JSON.parse(raw); }catch(e){ _lastSyncSnapshot=null; } }
function _mergeRecordFieldLevel(L,D,snapObj){ if(!snapObj) return (Number(L.updatedAt||0)>=Number(D.updatedAt||0))?L:D;
  const m={}; const keys=new Set([...Object.keys(L),...Object.keys(D),...Object.keys(snapObj)]); const lt=Number(L.updatedAt||0),dt=Number(D.updatedAt||0);
  for(const k of keys){ const lv=L[k],dv=D[k],sv=snapObj[k]; const ls=JSON.stringify(lv),ds=JSON.stringify(dv),ss=JSON.stringify(sv); let pick;
    if(ls===ds) pick=lv; else if(ls===ss) pick=dv; else if(ds===ss) pick=lv; else pick=(lt>=dt)?lv:dv; if(pick!==undefined) m[k]=pick; } return m; }
function mergeCollection(localArr,diskArr,snapMap){ const lb=Object.fromEntries((localArr||[]).map(x=>[x.id,x])); const db=Object.fromEntries((diskArr||[]).map(x=>[x.id,x]));
  const ids=new Set([...Object.keys(lb),...Object.keys(db)]); const merged=[];
  ids.forEach(id=>{ const L=lb[id],D=db[id],ss=snapMap?snapMap[id]:null;
    if(L&&D){ const ls=JSON.stringify(L),ds=JSON.stringify(D); if(ls===ds){merged.push(L);return;} if(ls===ss){merged.push(D);return;} if(ds===ss){merged.push(L);return;} let so=null; try{ so=ss?JSON.parse(ss):null; }catch(e){} merged.push(_mergeRecordFieldLevel(L,D,so)); }
    else if(L) merged.push(L); else if(D) merged.push(D); }); return merged; }
function mergeAll(local,disk,snap){ if(!disk) return local; if(!local) return disk; const r={};
  _SYNC_COLS.forEach(key=>{ r[key]=mergeCollection(local[key],disk[key],snap?snap[key]:null); });
  const lS=local.settings||{},dS=disk.settings||{}; r.settings=(Number(lS._updatedAt||0)>=Number(dS._updatedAt||0))?lS:dS;
  r.seq={}; const lq=local.seq||{},dq=disk.seq||{}; new Set([...Object.keys(lq),...Object.keys(dq)]).forEach(k=>{ r.seq[k]=Math.max(Number(lq[k]||0),Number(dq[k]||0)); });
  Object.keys(disk).forEach(k=>{ if(!(k in r)) r[k]=disk[k]; }); return r; }
function updateSyncStatus(state,msg){ const b=document.getElementById('dbx-sync-btn'); if(b){ b.style.display=DBX_TOKEN?'flex':'none'; b.style.color=state==='error'?'var(--red)':state==='syncing'?'var(--orange)':'var(--green)'; } const s=document.getElementById('dbx-status'); if(s) s.textContent=DBX_TOKEN?('連携済み ✓'+(msg?' / '+msg:'')):'未連携'; }

    if(data){ DATA = DATA? mergeAll(DATA,data,_lastSyncSnapshot) : data; _lastDbxRev=rev; _migrate(DATA); captureSyncSnapshot(DATA);
      try{ localStorage.setItem(LS_KEY,JSON.stringify(DATA)); localStorage.setItem(DBX_LS.cachedRev,rev||''); }catch(e){} updateSyncStatus('ok','同期OK'); refresh(); return true; }
    if(errorDetail && /not_found/.test(errorDetail)){ updateSyncStatus('syncing','新規作成'); _isSyncing=false; const ok=await saveToDropbox(); updateSyncStatus(ok?'ok':'error',ok?'作成済':'作成失敗'); return ok; }
    updateSyncStatus('error','データ無'); return false;
  }catch(e){ updateSyncStatus('error','エラー'); toast('同期エラー: '+e.message,'err'); return false; }

function _scheduleSync(){ if(!DBX_TOKEN) return; clearTimeout(_syncTimer); _syncTimer=setTimeout(()=>{ saveToDropbox(); }, 800); }
async function saveToDropbox(){ if(!DATA||!DBX_TOKEN) return true;
  if(_saveTail){ if(!_saveFollow){ const base=_saveTail; _saveFollow=(async()=>{ try{await base;}catch(_){} try{return await _doSaveCycle();}catch(_){return false;} finally{_saveFollow=null;} })(); _saveTail=_saveFollow; } return _saveFollow; }

async function _doSaveCycle(){ updateSyncStatus('syncing','保存中'); let att=0; const MAX=3; let lastErr=null;
  while(att<MAX){ att++; try{ const snapAtStart=_lastSyncSnapshot; let merged=DATA, revToUse=_lastDbxRev;
    try{ const {data:disk,rev:diskRev}=await dbxLoadData(); if(disk){ merged=mergeAll(DATA,disk,_lastSyncSnapshot); revToUse=diskRev; } }catch(e){}
    const jsonStr=JSON.stringify(merged); const newRev=await dbxSaveDataAtomic(jsonStr,revToUse);

    try{ localStorage.setItem(LS_KEY,JSON.stringify(DATA)); localStorage.setItem(DBX_LS.cachedRev,newRev||''); }catch(e){}
    updateSyncStatus('ok','同期OK'); lastErr=null; break;
  }catch(e){ lastErr=e; if(e.code==='rev_conflict'&&att<MAX){ await new Promise(r=>setTimeout(r,200)); continue; } break; } }
  if(lastErr){ updateSyncStatus('error','保存失敗'); toast('Dropbox保存エラー: '+lastErr.message,'err'); return false; } return true; }
async function syncNow(){ if(!DBX_TOKEN){ dbxAuthorize(); return; } await loadFromDropbox(); }

/* ───────── 起動 ───────── */
async function init(){
  document.getElementById('hdr-ver').textContent='v'+APP_VERSION;
  DBX_TOKEN=localStorage.getItem(DBX_LS.token); DBX_REFRESH=localStorage.getItem(DBX_LS.refresh);
  const fresh=!localStorage.getItem(LS_KEY);
  if(location.search.includes('code=')){ const ok=await dbxHandleCallback(); if(ok) DBX_TOKEN=localStorage.getItem(DBX_LS.token); }
  load();
  if(fresh && !DBX_TOKEN){ _seedRealDataSilent(); }  // 初回起動は請求書の実データを自動投入(Dropbox未連携時のみ)
  restoreSyncSnapshot();
  updateSyncStatus('ok','');
  switchTab('home');
  applyRole();
  if(DBX_TOKEN){ await loadFromDropbox(); }
  _startProactiveRefresh();
}
init();
</script>
